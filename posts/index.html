<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>trendlin · Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============================================
           $10 MILLION DOLLAR DESIGN SYSTEM
           Inspired by: The Verge, Bloomberg, NYT
        ============================================ */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --font-serif: 'Georgia', 'Times New Roman', Times, serif;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            
            /* Premium Color Palette */
            --primary: #0066cc;
            --primary-dark: #004999;
            --primary-soft: rgba(0,102,204,0.08);
            --accent: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            
            /* Neutrals - The New York Times style */
            --bg-dark: #0a0a0a;
            --bg-light: #ffffff;
            --bg-gray-50: #fafafa;
            --bg-gray-100: #f5f5f5;
            --bg-gray-200: #ebebeb;
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-tertiary: #767676;
            --text-quaternary: #a0a0a0;
            --border-light: #e5e5e5;
            --border-medium: #d4d4d4;
            
            /* Spacing - Luxury breathing room */
            --space-xs: 0.5rem;
            --space-sm: 0.75rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --space-xl: 2rem;
            --space-2xl: 2.5rem;
            --space-3xl: 3.5rem;
            --space-4xl: 5rem;
            
            /* Shadows - Depth without distraction */
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.02);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
            --shadow-xl: 0 24px 48px rgba(0,0,0,0.16);
            
            /* Typography Scale - Modular */
            --text-xs: 0.75rem;
            --text-sm: 0.875rem;
            --text-base: 1rem;
            --text-md: 1.125rem;
            --text-lg: 1.25rem;
            --text-xl: 1.5rem;
            --text-2xl: 1.875rem;
            --text-3xl: 2.25rem;
            --text-4xl: 3rem;
            --text-5xl: 3.75rem;
            --text-6xl: 4.5rem;
        }

        body {
            font-family: var(--font-serif);
            background: var(--bg-light);
            color: var(--text-primary);
            line-height: 1.5;
            font-size: var(--text-base);
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.003em;
        }

        /* ============================================
           PREMIUM COMPONENTS
        ============================================ */
        
        /* Reading Progress - Bloomberg style */
        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: none;
            z-index: 10000;
        }
        .reading-progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.08s linear;
        }

        /* Top Bar - The Verge style */
        .top-bar {
            position: sticky;
            top: 0;
            background: var(--bg-light);
            border-bottom: 1px solid var(--border-light);
            z-index: 9999;
            backdrop-filter: blur(0px);
        }
        .top-bar-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }
        @media (max-width: 768px) {
            .top-bar-inner { padding: 0 20px; height: 60px; }
        }
        .logo {
            font-family: var(--font-sans);
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            text-decoration: none;
        }
        .logo span {
            color: var(--primary);
        }
        .header-actions {
            display: flex;
            gap: 12px;
        }
        .header-btn {
            background: transparent;
            border: none;
            font-size: 0.875rem;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 6px 12px;
            transition: color 0.2s;
        }
        .header-btn:hover {
            color: var(--text-primary);
        }

        /* Back to Top - Minimal */
        .back-to-top {
            position: fixed;
            right: 32px;
            bottom: 32px;
            width: 44px;
            height: 44px;
            background: var(--bg-light);
            border: 1px solid var(--border-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: var(--shadow-md);
            z-index: 9990;
        }
        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }
        .back-to-top:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        /* Toast - Elegant */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-primary);
            color: white;
            padding: 10px 24px;
            border-radius: 100px;
            font-size: 0.875rem;
            font-family: var(--font-sans);
            z-index: 10001;
            animation: toastEnter 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            white-space: nowrap;
            letter-spacing: normal;
        }
        @keyframes toastEnter {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* ============================================
           MAIN LAYOUT - NEW YORK TIMES STYLE
        ============================================ */
        .article-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 48px;
        }
        @media (max-width: 768px) {
            .article-container { padding: 0 20px; }
        }

        .article-grid {
            display: flex;
            gap: 64px;
            margin-top: 48px;
            margin-bottom: 80px;
        }
        @media (max-width: 1024px) {
            .article-grid { gap: 48px; }
        }
        @media (max-width: 900px) {
            .article-grid { flex-direction: column; gap: 32px; }
        }

        /* Sidebar - Table of Contents */
        .article-sidebar {
            flex: 0 0 260px;
            position: sticky;
            top: 100px;
            align-self: start;
        }
        @media (max-width: 900px) {
            .article-sidebar { display: none; }
        }
        .toc-wrapper {
            border-left: 1px solid var(--border-light);
            padding-left: 20px;
        }
        .toc-label {
            font-family: var(--font-sans);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
            margin-bottom: 16px;
        }
        .toc-list {
            list-style: none;
        }
        .toc-list li {
            margin-bottom: 12px;
        }
        .toc-list a {
            font-family: var(--font-sans);
            font-size: 0.8rem;
            font-weight: 450;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
            display: block;
            line-height: 1.4;
        }
        .toc-list a:hover {
            color: var(--primary);
        }
        .toc-list a.active {
            color: var(--primary);
            font-weight: 600;
        }

        /* Share Widget - Premium */
        .share-widget {
            margin-top: 32px;
            border-left: 1px solid var(--border-light);
            padding-left: 20px;
        }
        .share-label {
            font-family: var(--font-sans);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
            margin-bottom: 16px;
        }
        .share-icons {
            display: flex;
            gap: 12px;
        }
        .share-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gray-100);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }
        .share-icon:hover {
            transform: translateY(-2px);
        }
        .share-icon.twitter:hover { background: #1DA1F2; color: white; }
        .share-icon.linkedin:hover { background: #0A66C2; color: white; }
        .share-icon.facebook:hover { background: #1877F2; color: white; }
        .share-icon.copy:hover { background: var(--text-primary); color: white; }

        /* ============================================
           MAIN CONTENT - SUPERIOR TYPOGRAPHY
        ============================================ */
        .article-main {
            flex: 1;
            max-width: 720px;
        }
        @media (max-width: 900px) {
            .article-main { max-width: 100%; }
        }

        /* Article Header */
        .article-header {
            margin-bottom: 48px;
        }
        .article-category {
            font-family: var(--font-sans);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--primary);
            margin-bottom: 20px;
            display: inline-block;
        }
        .article-title {
            font-size: var(--text-5xl);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.15;
            margin-bottom: 20px;
            font-family: var(--font-serif);
        }
        @media (max-width: 768px) {
            .article-title { font-size: var(--text-3xl); }
        }
        .article-excerpt {
            font-size: var(--text-lg);
            line-height: 1.5;
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-family: var(--font-serif);
        }
        @media (max-width: 768px) {
            .article-excerpt { font-size: var(--text-md); }
        }

        /* Byline - NYT Style */
        .byline {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px 0;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 40px;
        }
        .author-card {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .author-avatar {
            width: 48px;
            height: 48px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1rem;
        }
        .author-name {
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }
        .author-title {
            font-family: var(--font-sans);
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }
        .article-meta {
            display: flex;
            gap: 24px;
            font-family: var(--font-sans);
            font-size: 0.8rem;
            color: var(--text-tertiary);
        }
        .article-meta span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* Featured Image - Cinematic */
        .featured-image {
            margin: 48px 0;
            border-radius: 0;
            overflow: hidden;
        }
        .featured-image img {
            width: 100%;
            height: auto;
            display: block;
        }
        .image-caption {
            font-family: var(--font-sans);
            font-size: 0.75rem;
            color: var(--text-tertiary);
            text-align: center;
            margin-top: 12px;
            letter-spacing: normal;
        }

        /* ============================================
           ARTICLE BODY - READABILITY FIRST
        ============================================ */
        .article-body {
            font-size: var(--text-md);
            line-height: 1.7;
            color: var(--text-secondary);
            font-family: var(--font-serif);
        }
        .article-body h2 {
            font-size: var(--text-2xl);
            font-weight: 700;
            margin: 2em 0 0.75em;
            scroll-margin-top: 90px;
            color: var(--text-primary);
            font-family: var(--font-serif);
            letter-spacing: -0.01em;
        }
        .article-body h3 {
            font-size: var(--text-xl);
            font-weight: 600;
            margin: 1.5em 0 0.5em;
            scroll-margin-top: 90px;
            color: var(--text-primary);
            font-family: var(--font-serif);
        }
        .article-body p {
            margin-bottom: 1.5em;
        }
        .article-body ul, .article-body ol {
            margin: 1.2em 0 1.5em 1.8em;
        }
        .article-body li {
            margin-bottom: 0.5em;
        }
        .article-body blockquote {
            border-left: 3px solid var(--primary);
            background: var(--bg-gray-50);
            padding: 1.2rem 2rem;
            margin: 2rem 0;
            font-style: normal;
            font-size: 1.05rem;
            line-height: 1.6;
        }
        .article-body blockquote p {
            margin-bottom: 0;
        }
        .article-body iframe {
            width: 100%;
            margin: 2rem 0;
            border: none;
            border-radius: 0;
        }
        .article-body img {
            max-width: 100%;
            height: auto;
            margin: 2rem 0;
        }
        .article-body .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            margin: 2rem 0;
        }
        .article-body .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            margin: 0;
        }

        /* ============================================
           COMPONENTS - AUTO-DETECTED
        ============================================ */
        
        /* Comparison Grid - Premium */
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin: 48px 0;
        }
        @media (max-width: 640px) {
            .comparison-grid { grid-template-columns: 1fr; gap: 24px; }
        }
        .comparison-card {
            padding: 28px;
            border-radius: 0;
            background: var(--bg-gray-50);
        }
        .comparison-card.love-card {
            border-left: 3px solid var(--success);
        }
        .comparison-card.wait-card {
            border-left: 3px solid var(--warning);
        }
        .comparison-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            font-family: var(--font-sans);
            font-weight: 700;
        }
        .love-card .comparison-header { color: var(--success); }
        .wait-card .comparison-header { color: var(--warning); }
        .comparison-list {
            list-style: none;
        }
        .comparison-list li {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        /* Pros/Cons Grid */
        .pros-cons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin: 48px 0;
        }
        @media (max-width: 640px) {
            .pros-cons-grid { grid-template-columns: 1fr; gap: 24px; }
        }
        .pro-card, .cons-card {
            padding: 28px;
            background: var(--bg-gray-50);
        }
        .pro-card {
            border-left: 3px solid var(--success);
        }
        .cons-card {
            border-left: 3px solid var(--warning);
        }
        .pro-card h3, .cons-card h3 {
            font-family: var(--font-sans);
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        /* Author Bio - Elegant */
        .author-bio {
            background: var(--bg-gray-50);
            padding: 40px;
            margin: 56px 0;
            display: flex;
            gap: 32px;
            align-items: center;
        }
        .bio-avatar {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }
        .bio-content h3 {
            font-family: var(--font-sans);
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .bio-content p {
            font-size: 0.9rem;
            color: var(--text-tertiary);
            line-height: 1.6;
        }
        @media (max-width: 640px) {
            .author-bio {
                flex-direction: column;
                text-align: center;
                padding: 28px;
            }
        }

        /* Related Articles */
        .related-articles {
            margin: 56px 0;
        }
        .related-title {
            font-family: var(--font-sans);
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 28px;
            color: var(--text-tertiary);
        }
        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
        }
        .related-card {
            text-decoration: none;
            transition: all 0.3s ease;
            display: block;
        }
        .related-card:hover {
            transform: translateY(-4px);
        }
        .related-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: var(--bg-gray-100);
        }
        .related-card h4 {
            font-family: var(--font-serif);
            font-size: 1rem;
            font-weight: 600;
            margin-top: 12px;
            color: var(--text-primary);
            line-height: 1.4;
        }
        .related-meta {
            font-family: var(--font-sans);
            font-size: 0.7rem;
            color: var(--text-tertiary);
            margin-top: 6px;
        }

        /* Loading - Minimal */
        .loading-state {
            text-align: center;
            padding: 100px 20px;
        }
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--border-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error */
        .error-state {
            text-align: center;
            padding: 100px 20px;
        }

        /* Dark Mode - Automatic */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-light: #0a0a0a;
                --bg-gray-50: #111111;
                --bg-gray-100: #1a1a1a;
                --text-primary: #e5e5e5;
                --text-secondary: #b0b0b0;
                --text-tertiary: #7a7a7a;
                --border-light: #2a2a2a;
                --border-medium: #3a3a3a;
            }
        }

        /* Print */
        @media print {
            .top-bar, .article-sidebar, .back-to-top, .related-articles {
                display: none !important;
            }
            .article-grid {
                display: block;
            }
            body {
                font-size: 11pt;
            }
            .article-title {
                font-size: 18pt;
            }
        }
    </style>
</head>
<body>

<div class="reading-progress">
    <div class="reading-progress-bar" id="progressFill"></div>
</div>

<div class="top-bar">
    <div class="top-bar-inner">
        <a href="/" class="logo">trendlin<span>.</span></a>
        <div class="header-actions">
            <button class="header-btn" id="printBtn"><i class="fas fa-print"></i></button>
        </div>
    </div>
</div>

<button class="back-to-top" id="backTopBtn">
    <i class="fas fa-arrow-up"></i>
</button>

<div class="article-container">
    <div id="app">
        <div class="loading-state">
            <div class="loading-spinner"></div>
            <p>Loading premium content...</p>
        </div>
    </div>
</div>

<script>
    // ============================================
    // $10 MILLION DOLLAR CODE
    // Clean, Fast, Perfect
    // ============================================
    
    function getPostId() {
        return new URLSearchParams(window.location.search).get('id');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
        });
    }
    
    function formatDate(dateStr) {
        if (!dateStr) return 'Recent';
        try {
            return new Date(dateStr).toLocaleDateString('en-US', {
                year: 'numeric', month: 'long', day: 'numeric'
            });
        } catch { return dateStr; }
    }
    
    function showToast(msg) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    window.shareArticle = function(platform) {
        const url = encodeURIComponent(window.location.href);
        const title = encodeURIComponent(document.title);
        const links = {
            twitter: `https://twitter.com/intent/tweet?text=${title}&url=${url}`,
            linkedin: `https://www.linkedin.com/sharing/share-offsite/?url=${url}`,
            facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}`,
            copy: null
        };
        if (platform === 'copy') {
            navigator.clipboard.writeText(window.location.href).then(() => showToast('Link copied'));
            return;
        }
        if (links[platform]) window.open(links[platform], '_blank', 'width=600,height=500');
    };
    
    // Fix YouTube embeds - perfect responsive
    function fixEmbeds(html) {
        return html.replace(
            /<iframe[^>]+src=["'](https?:\/\/(?:www\.)?youtube\.com\/embed\/[^"']+)["'][^>]*><\/iframe>/gi,
            '<div class="video-wrapper"><iframe src="$1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>'
        );
    }
    
    // Auto-detect comparison sections
    function transformComparison(html) {
        const div = document.createElement('div');
        div.innerHTML = html;
        
        let love = [], wait = [];
        let inLove = false, inWait = false;
        
        const walk = (node) => {
            if (node.nodeType === Node.ELEMENT_NODE) {
                const text = node.textContent || '';
                if (text.includes("You'll love it if")) {
                    inLove = true; inWait = false;
                    node.remove(); return;
                }
                if (text.includes("You might want to wait if")) {
                    inWait = true; inLove = false;
                    node.remove(); return;
                }
                if (inLove && node.tagName === 'LI') {
                    love.push(node.innerHTML);
                    node.remove(); return;
                }
                if (inWait && node.tagName === 'LI') {
                    wait.push(node.innerHTML);
                    node.remove(); return;
                }
                if ((node.tagName === 'H2' || node.tagName === 'H3') && (inLove || inWait)) {
                    inLove = false; inWait = false;
                }
                Array.from(node.childNodes).forEach(walk);
            }
        };
        
        Array.from(div.childNodes).forEach(walk);
        
        if (love.length || wait.length) {
            const comparison = `
                <div class="comparison-grid">
                    ${love.length ? `
                        <div class="comparison-card love-card">
                            <div class="comparison-header"><i class="fas fa-heart"></i> <span>You'll love it if</span></div>
                            <ul class="comparison-list">${love.map(l => `<li><i class="fas fa-check-circle"></i> ${l}</li>`).join('')}</ul>
                        </div>
                    ` : ''}
                    ${wait.length ? `
                        <div class="comparison-card wait-card">
                            <div class="comparison-header"><i class="fas fa-clock"></i> <span>You might want to wait if</span></div>
                            <ul class="comparison-list">${wait.map(w => `<li><i class="fas fa-hourglass-half"></i> ${w}</li>`).join('')}</ul>
                        </div>
                    ` : ''}
                </div>
            `;
            const firstH2 = div.querySelector('h2');
            if (firstH2) firstH2.insertAdjacentHTML('beforebegin', comparison);
            else div.insertAdjacentHTML('afterbegin', comparison);
        }
        
        return div.innerHTML;
    }
    
    // Generate TOC from H2
    function generateTOC(html) {
        const div = document.createElement('div');
        div.innerHTML = html;
        const headings = div.querySelectorAll('h2');
        const toc = [];
        headings.forEach((h, i) => {
            const text = h.textContent;
            const id = `section-${i}`;
            h.id = id;
            toc.push({ id, text });
        });
        return { toc, content: div.innerHTML };
    }
    
    // Render pros/cons from JSON
    function renderProsCons(post) {
        if ((!post.pros || !post.pros.length) && (!post.cons || !post.cons.length)) return '';
        return `
            <div class="pros-cons-grid">
                ${post.pros?.length ? `
                    <div class="pro-card">
                        <h3><i class="fas fa-thumbs-up"></i> What Works Well</h3>
                        <ul>${post.pros.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul>
                    </div>
                ` : ''}
                ${post.cons?.length ? `
                    <div class="cons-card">
                        <h3><i class="fas fa-exclamation-triangle"></i> Where It Falls Short</h3>
                        <ul>${post.cons.map(c => `<li>${escapeHtml(c)}</li>`).join('')}</ul>
                    </div>
                ` : ''}
            </div>
        `;
    }
    
    // Active TOC highlight
    function initActiveHighlight() {
        const sections = document.querySelectorAll('h2[id]');
        const links = document.querySelectorAll('.toc-link');
        if (!sections.length) return;
        
        const update = () => {
            let current = '';
            const scrollPos = window.scrollY + 100;
            for (let i = sections.length - 1; i >= 0; i--) {
                if (scrollPos >= sections[i].offsetTop) {
                    current = sections[i].id;
                    break;
                }
            }
            links.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === `#${current}`) {
                    link.classList.add('active');
                }
            });
        };
        
        window.addEventListener('scroll', update);
        update();
    }
    
    // Progress tracking
    function initProgress() {
        const update = () => {
            const scrollTop = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - window.innerHeight;
            const percent = height ? (scrollTop / height) * 100 : 0;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('backTopBtn').classList.toggle('visible', scrollTop > 300);
        };
        window.addEventListener('scroll', update);
        update();
    }
    
    async function loadArticle() {
        const postId = getPostId();
        const app = document.getElementById('app');
        
        if (!postId) {
            app.innerHTML = '<div class="error-state"><h2>No article selected</h2><p>Use ?id=1</p></div>';
            return;
        }
        
        try {
            const res = await fetch(`/data/posts.json?t=${Date.now()}`);
            if (!res.ok) throw new Error('Failed to load');
            
            const data = await res.json();
            const posts = Array.isArray(data) ? data : (data.posts || []);
            const post = posts.find(p => String(p.id) === String(postId));
            if (!post) throw new Error('Article not found');
            
            document.title = `${post.title} | trendlin`;
            
            // Process content
            let contentHtml = post.content || '<p>Content coming soon...</p>';
            contentHtml = fixEmbeds(contentHtml);
            contentHtml = transformComparison(contentHtml);
            
            const { toc, content } = generateTOC(contentHtml);
            const prosConsHtml = renderProsCons(post);
            
            let finalContent = content;
            if (prosConsHtml && !finalContent.includes('pros-cons-grid')) {
                finalContent += prosConsHtml;
            }
            
            // Build TOC
            const tocHtml = toc.length ? `
                <aside class="article-sidebar">
                    <div class="toc-wrapper">
                        <div class="toc-label">CONTENTS</div>
                        <ul class="toc-list">
                            ${toc.map(item => `<li><a href="#${item.id}" class="toc-link">${escapeHtml(item.text)}</a></li>`).join('')}
                        </ul>
                    </div>
                    <div class="share-widget">
                        <div class="share-label">SHARE</div>
                        <div class="share-icons">
                            <button class="share-icon twitter" onclick="shareArticle('twitter')"><i class="fab fa-twitter"></i></button>
                            <button class="share-icon linkedin" onclick="shareArticle('linkedin')"><i class="fab fa-linkedin-in"></i></button>
                            <button class="share-icon facebook" onclick="shareArticle('facebook')"><i class="fab fa-facebook-f"></i></button>
                            <button class="share-icon copy" onclick="shareArticle('copy')"><i class="fas fa-link"></i></button>
                        </div>
                    </div>
                </aside>
            ` : '';
            
            // Related posts
            const related = posts.filter(p => String(p.id) !== String(post.id) && p.category === post.category).slice(0, 3);
            const relatedHtml = related.length ? `
                <div class="related-articles">
                    <div class="related-title">MORE FROM TRENDLIN</div>
                    <div class="related-grid">
                        ${related.map(rel => `
                            <a href="?id=${rel.id}" class="related-card">
                                <img src="${rel.image || 'https://images.unsplash.com/photo-1585123334904-845d60e5bcc2?w=400&h=240&fit=crop'}" alt="${escapeHtml(rel.title)}" loading="lazy">
                                <h4>${escapeHtml(rel.title)}</h4>
                                <div class="related-meta">${rel.readTime || 5} min read</div>
                            </a>
                        `).join('')}
                    </div>
                </div>
            ` : '';
            
            const authorInitial = (post.author || 'E').charAt(0).toUpperCase();
            
            app.innerHTML = `
                <div class="article-grid">
                    ${tocHtml}
                    <main class="article-main">
                        <article>
                            <header class="article-header">
                                <div class="article-category">${escapeHtml(post.category || 'INSIGHT')}</div>
                                <h1 class="article-title">${escapeHtml(post.title)}</h1>
                                <div class="article-excerpt">${escapeHtml(post.excerpt || post.metaDescription || '')}</div>
                                <div class="byline">
                                    <div class="author-card">
                                        <div class="author-avatar">${authorInitial}</div>
                                        <div>
                                            <div class="author-name">${escapeHtml(post.author || 'Editorial Team')}</div>
                                            <div class="author-title">Senior Writer</div>
                                        </div>
                                    </div>
                                    <div class="article-meta">
                                        <span><i class="far fa-calendar-alt"></i> ${formatDate(post.datePublished || post.date)}</span>
                                        <span><i class="far fa-clock"></i> ${post.readTime || 6} min read</span>
                                        <span><i class="far fa-eye"></i> ${(post.views || 12540).toLocaleString()}</span>
                                    </div>
                                </div>
                            </header>
                            
                            ${post.image ? `
                                <div class="featured-image">
                                    <img src="${post.image}" alt="${escapeHtml(post.imageAlt || post.title)}">
                                    ${post.imageAlt ? `<div class="image-caption">${escapeHtml(post.imageAlt)}</div>` : ''}
                                </div>
                            ` : ''}
                            
                            <div class="article-body">
                                ${finalContent}
                            </div>
                            
                            <div class="author-bio">
                                <div class="bio-avatar">${authorInitial}</div>
                                <div class="bio-content">
                                    <h3>${escapeHtml(post.author || 'Editorial Team')}</h3>
                                    <p>${escapeHtml(post.authorBio || 'Covering technology and innovation with deep industry expertise.')}</p>
                                    ${post.redditLink ? `<a href="${post.redditLink}" target="_blank" style="display: inline-block; margin-top: 16px; color: var(--primary); text-decoration: none; font-family: var(--font-sans); font-size: 0.8rem;">Join discussion →</a>` : ''}
                                </div>
                            </div>
                            
                            ${relatedHtml}
                        </article>
                    </main>
                </div>
            `;
            
            // Smooth scroll for TOC
            document.querySelectorAll('.toc-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const target = document.getElementById(link.getAttribute('href').substring(1));
                    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            });
            
            initActiveHighlight();
            initProgress();
            
            document.getElementById('printBtn')?.addEventListener('click', () => window.print());
            window.scrollTo(0, 0);
            
        } catch (error) {
            console.error(error);
            app.innerHTML = `<div class="error-state"><h2>Unable to load</h2><p>${escapeHtml(error.message)}</p></div>`;
        }
    }
    
    loadArticle();
</script>
</body>
</html>
