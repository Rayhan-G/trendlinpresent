<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Enterprise-grade article platform with professional social sharing">
    <meta property="og:title" content="Article | Enterprise Platform">
    <meta property="og:type" content="article">
    <meta property="og:image" content="">
    <meta property="og:description" content="Enterprise-grade article platform">
    <meta name="twitter:card" content="summary_large_image">
    <title>Article | Enterprise Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg-primary: #ffffff;
            --color-bg-secondary: #f8fafc;
            --color-text-primary: #0f172a;
            --color-text-secondary: #334155;
            --color-text-tertiary: #64748b;
            --color-accent: #3b82f6;
            --color-accent-dark: #2563eb;
            --color-border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius-lg: 1rem;
            --radius-xl: 1.5rem;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            font-family: var(--font-sans);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Progress bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--color-border);
            z-index: 1000;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--color-accent);
            transition: width 0.1s linear;
        }

        /* Floating back to top */
        .floating-btn {
            position: fixed;
            right: 24px;
            bottom: 24px;
            width: 48px;
            height: 48px;
            background: var(--color-bg-primary);
            border: 1px solid var(--color-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-md);
            z-index: 99;
            font-size: 1.25rem;
        }
        .floating-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header - MINIMAL PADDING */
        .article-header {
            padding: 12px 0 8px;  /* Reduced further */
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--color-text-tertiary);
            text-decoration: none;
            font-size: 0.875rem;
            margin-bottom: 12px;  /* Reduced */
            transition: color 0.2s;
        }
        .category-badge {
            display: inline-flex;
            background: #eff6ff;
            color: var(--color-accent-dark);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 10px;  /* Reduced */
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 12px;  /* Reduced */
            line-height: 1.2;
        }
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
        }

        /* Meta */
        .meta-grid {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 24px;
            padding-bottom: 12px;  /* Reduced */
            border-bottom: 1px solid var(--color-border);
            margin-bottom: 24px;  /* Reduced */
        }
        .author-card {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .author-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--color-accent), var(--color-accent-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1rem;
        }
        .author-name {
            font-weight: 700;
        }
        .author-title {
            font-size: 0.75rem;
            color: var(--color-text-tertiary);
        }
        .meta-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            color: var(--color-text-tertiary);
            font-size: 0.875rem;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Featured image */
        .featured-image {
            margin: 16px 0 32px;  /* Reduced */
            border-radius: var(--radius-xl);
            overflow: hidden;
        }
        .featured-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ============================================
           PREMIUM STICKY SIDEBAR LAYOUT
        ============================================ */
        .content-layout {
            display: flex;
            gap: 48px;
            position: relative;
        }

        /* Sticky Table of Contents Sidebar */
        .toc-sidebar {
            flex: 0 0 280px;
            position: sticky;
            top: 100px;
            align-self: flex-start;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            background: var(--color-bg-secondary);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            border: 1px solid var(--color-border);
        }
        .toc-sidebar::-webkit-scrollbar {
            width: 3px;
        }
        .toc-sidebar::-webkit-scrollbar-track {
            background: var(--color-border);
            border-radius: 10px;
        }
        .toc-sidebar::-webkit-scrollbar-thumb {
            background: var(--color-accent);
            border-radius: 10px;
        }
        .toc-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--color-border);
        }
        .toc-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--color-accent), var(--color-accent-dark));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toc-icon svg {
            width: 14px;
            height: 14px;
            stroke: white;
        }
        .toc-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--color-text-tertiary);
        }
        .toc-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            list-style: none;
        }
        .toc-list li a {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--color-text-secondary);
            text-decoration: none;
            transition: var(--transition);
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            line-height: 1.3;
        }
        .toc-list li a:hover {
            background: rgba(59, 130, 246, 0.08);
            color: var(--color-accent);
            transform: translateX(2px);
        }
        .toc-list li a.active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(59, 130, 246, 0.05));
            color: var(--color-accent);
            font-weight: 600;
            border-left: 2px solid var(--color-accent);
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            min-width: 0;
            max-width: 780px;
        }

        /* Article Content */
        .article-content {
            font-size: 1.125rem;
            color: var(--color-text-secondary);
            line-height: 1.75;
        }
        .article-content h2 {
            font-size: 1.75rem;
            margin: 2.5em 0 0.75em;
            scroll-margin-top: 80px;
            color: var(--color-text-primary);
        }
        .article-content p {
            margin-bottom: 1.5em;
        }
        .article-content blockquote {
            border-left: 4px solid var(--color-accent);
            background: var(--color-bg-secondary);
            padding: 1.5rem 2rem;
            margin: 2rem 0;
            font-style: italic;
            border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
        }

        /* Author bio */
        .author-bio-section {
            background: var(--color-bg-secondary);
            border-radius: var(--radius-xl);
            padding: 2rem;
            margin: 3rem 0;
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        .bio-avatar-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--color-accent), var(--color-accent-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }
        .bio-content h3 {
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
        }
        .bio-content p {
            font-size: 0.875rem;
            color: var(--color-text-secondary);
        }
        @media (max-width: 640px) {
            .author-bio-section {
                flex-direction: column;
                text-align: center;
            }
        }

        /* Social Share Section */
        .share-container {
            text-align: center;
            padding: 2.5rem 0;
            border-top: 1px solid var(--color-border);
            border-bottom: 1px solid var(--color-border);
            margin: 3rem 0;
        }
        .share-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
            color: var(--color-text-tertiary);
            margin-bottom: 1.25rem;
        }
        .share-grid {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .share-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 0.75rem 1.5rem;
            background: var(--color-bg-primary);
            border: 1px solid var(--color-border);
            border-radius: 60px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            color: var(--color-text-primary);
        }
        .share-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .share-button.twitter:hover { background: #1DA1F2; border-color: #1DA1F2; color: white; }
        .share-button.linkedin:hover { background: #0A66C2; border-color: #0A66C2; color: white; }
        .share-button.facebook:hover { background: #1877F2; border-color: #1877F2; color: white; }
        .share-button.whatsapp:hover { background: #25D366; border-color: #25D366; color: white; }
        .share-button.copy:hover { background: var(--color-text-primary); border-color: var(--color-text-primary); color: white; }
        .share-icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .share-icon svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        /* Related articles */
        .related-section {
            margin: 3rem 0;
        }
        .related-section h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
        }
        .related-article {
            background: var(--color-bg-primary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            text-decoration: none;
            transition: var(--transition);
        }
        .related-article:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .related-article img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }
        .related-article h3 {
            padding: 1rem 1rem 0.5rem;
            font-size: 1rem;
            color: var(--color-text-primary);
        }
        .related-meta {
            padding: 0 1rem 1rem;
            font-size: 0.75rem;
            color: var(--color-text-tertiary);
        }

        .post-navigation {
            display: flex;
            justify-content: space-between;
            margin: 3rem 0 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--color-border);
        }
        .nav-link {
            color: var(--color-accent);
            text-decoration: none;
            font-weight: 500;
        }
        .nav-link:hover {
            text-decoration: underline;
        }

        /* Loading */
        .loading-state {
            text-align: center;
            padding: 6rem 0;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-state {
            text-align: center;
            padding: 6rem 0;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1f36;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 40px;
            font-size: 0.875rem;
            z-index: 1100;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Mobile: TOC becomes full width */
        @media (max-width: 900px) {
            .content-layout {
                flex-direction: column;
            }
            .toc-sidebar {
                position: relative;
                top: 0;
                width: 100%;
                margin-bottom: 2rem;
                order: -1;
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <button class="floating-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" aria-label="Back to top">↑</button>

    <div class="container">
        <main>
            <div id="articleContainer" class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading article...</p>
            </div>
        </main>
    </div>

    <script>
        (function() {
            function getPostId() {
                const params = new URLSearchParams(window.location.search);
                return params.get('id');
            }

            function escapeHtml(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function formatDate(dateString) {
                if (!dateString) return 'Recent';
                try {
                    const date = new Date(dateString);
                    return date.toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                } catch {
                    return dateString;
                }
            }

            function showToast(message) {
                const existing = document.querySelector('.toast');
                if (existing) existing.remove();
                
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            window.shareArticle = function(platform) {
                const url = encodeURIComponent(window.location.href);
                const title = encodeURIComponent(document.title);
                
                const shareUrls = {
                    twitter: `https://twitter.com/intent/tweet?text=${title}&url=${url}`,
                    linkedin: `https://www.linkedin.com/sharing/share-offsite/?url=${url}`,
                    facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}`,
                    whatsapp: `https://wa.me/?text=${title}%20${url}`,
                    copy: null
                };
                
                if (platform === 'copy') {
                    navigator.clipboard.writeText(window.location.href).then(() => {
                        showToast('✓ Link copied to clipboard!');
                    }).catch(() => {
                        showToast('Failed to copy link');
                    });
                    return;
                }
                
                if (shareUrls[platform]) {
                    window.open(shareUrls[platform], '_blank', 'width=600,height=500,noopener,noreferrer');
                }
            };

            // Generate sticky sidebar Table of Contents
            function generateStickyTOC(htmlContent) {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = htmlContent;
                const headings = tempDiv.querySelectorAll('h2, h3');
                
                if (headings.length === 0) {
                    return { toc: '', content: htmlContent, hasToc: false };
                }
                
                const tocItems = [];
                headings.forEach((heading, index) => {
                    const text = heading.textContent;
                    const level = heading.tagName.toLowerCase();
                    const id = `section-${index}`;
                    heading.id = id;
                    tocItems.push(`<li><a href="#${id}" class="toc-link ${level}">${escapeHtml(text)}</a></li>`);
                });
                
                const tocHtml = `
                    <div class="toc-sidebar">
                        <div class="toc-header">
                            <div class="toc-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 6h16M4 12h16M4 18h16"/>
                                </svg>
                            </div>
                            <span class="toc-title">TABLE OF CONTENTS</span>
                        </div>
                        <ul class="toc-list">
                            ${tocItems.join('')}
                        </ul>
                    </div>
                `;
                
                return {
                    toc: tocHtml,
                    content: tempDiv.innerHTML,
                    hasToc: true
                };
            }

            // Active section highlighting
            function setupActiveHighlight() {
                const sections = document.querySelectorAll('h2[id^="section-"], h3[id^="section-"]');
                const navLinks = document.querySelectorAll('.toc-list a');
                
                if (!sections.length) return;
                
                function updateActiveLink() {
                    let current = '';
                    const scrollPos = window.scrollY + 120;
                    
                    sections.forEach(section => {
                        const sectionTop = section.offsetTop;
                        const sectionBottom = sectionTop + section.offsetHeight;
                        if (scrollPos >= sectionTop && scrollPos < sectionBottom) {
                            current = section.getAttribute('id');
                        }
                    });
                    
                    navLinks.forEach(link => {
                        link.classList.remove('active');
                        if (link.getAttribute('href') === `#${current}`) {
                            link.classList.add('active');
                        }
                    });
                }
                
                window.addEventListener('scroll', updateActiveLink);
                updateActiveLink();
            }

            function updateProgress() {
                const winScroll = document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - window.innerHeight;
                const scrolled = height ? (winScroll / height) * 100 : 0;
                const progressFill = document.getElementById('progressFill');
                if (progressFill) progressFill.style.width = scrolled + '%';
            }

            async function loadPost() {
                const postId = getPostId();
                const container = document.getElementById('articleContainer');
                
                if (!postId) {
                    container.innerHTML = `
                        <div class="error-state">
                            <h2>No Article Selected</h2>
                            <p style="margin: 1rem 0; color: #64748b;">Please select an article to read.</p>
                            <a href="/" style="color: #3b82f6; text-decoration: none;">← Return to Home</a>
                        </div>
                    `;
                    return;
                }
                
                try {
                    const response = await fetch('/data/posts.json?t=' + Date.now());
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const data = await response.json();
                    const posts = Array.isArray(data) ? data : (data.posts || []);
                    const post = posts.find(p => String(p.id) === String(postId));
                    
                    if (!post) throw new Error('Article not found');
                    
                    document.title = `${post.title} | Enterprise`;
                    
                    let contentHtml = post.content || post.excerpt || '<p>Content coming soon...</p>';
                    const { toc, content, hasToc } = generateStickyTOC(contentHtml);
                    const related = posts.filter(p => String(p.id) !== String(postId) && p.category === post.category).slice(0, 3);
                    
                    const authorName = post.author || 'Editorial Team';
                    const authorInitial = authorName.charAt(0).toUpperCase();
                    const authorBio = post.authorBio || 'Industry expert providing deep insights into technology and innovation.';
                    const readTime = post.readTime || 6;
                    const publishedDate = formatDate(post.date);
                    
                    // Social Share Icons
                    const twitterIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231z"/></svg>`;
                    const linkedinIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451c.979 0 1.771-.773 1.771-1.729V1.729C24 .774 23.222 0 22.225 0z"/></svg>`;
                    const facebookIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>`;
                    const whatsappIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path d="M12.032 2.018c-5.509 0-9.982 4.471-9.982 9.977 0 1.758.458 3.482 1.329 4.98l-1.415 5.064 5.197-1.392c1.455.791 3.105 1.209 4.871 1.209 5.509 0 9.982-4.471 9.982-9.977s-4.473-9.977-9.982-9.977z"/><path d="M16.6 13.8c-.25-.125-1.477-.728-1.706-.811s-.396-.125-.562.125-.643.811-.788.977-.29.187-.54.062c-.25-.125-1.055-.389-2.009-1.239-.742-.665-1.243-1.485-1.389-1.736-.145-.25-.016-.385.109-.509.112-.112.249-.291.374-.437.125-.146.166-.25.249-.416.083-.166.042-.312-.021-.437-.062-.125-.562-1.354-.77-1.854-.203-.491-.409-.424-.562-.432-.146-.008-.312-.01-.478-.01-.166 0-.437.062-.665.312-.229.25-.873.852-.873 2.078 0 1.226.893 2.41 1.017 2.577.125.166 1.756 2.679 4.254 3.757.594.256 1.058.409 1.42.524.596.19 1.139.163 1.568.099.478-.072 1.477-.604 1.685-1.187.208-.583.208-1.083.146-1.187-.062-.104-.229-.166-.479-.291z"/></svg>`;
                    const copyIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>`;
                    
                    container.innerHTML = `
                        <article>
                            <div class="article-header">
                                <a href="/" class="back-link">← Back to Home</a>
                                <div class="category-badge">${escapeHtml(post.category || 'Article')}</div>
                                <h1>${escapeHtml(post.title)}</h1>
                                <div class="meta-grid">
                                    <div class="author-card">
                                        <div class="author-avatar">${escapeHtml(authorInitial)}</div>
                                        <div class="author-details">
                                            <div class="author-name">${escapeHtml(authorName)}</div>
                                            <div class="author-title">Senior Writer</div>
                                        </div>
                                    </div>
                                    <div class="meta-stats">
                                        <div class="stat-item">📅 ${publishedDate}</div>
                                        <div class="stat-item">⏱️ ${readTime} min read</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="featured-image">
                                <img src="${post.image || `https://picsum.photos/880/520?random=${post.id}`}" alt="${escapeHtml(post.title)}">
                            </div>
                            
                            <div class="content-layout">
                                ${hasToc ? toc : ''}
                                <div class="main-content">
                                    <div class="article-content">
                                        ${content}
                                    </div>
                                    
                                    <div class="author-bio-section">
                                        <div class="bio-avatar-large">${escapeHtml(authorInitial)}</div>
                                        <div class="bio-content">
                                            <h3>${escapeHtml(authorName)}</h3>
                                            <p>${escapeHtml(authorBio)}</p>
                                        </div>
                                    </div>
                                    
                                    <div class="share-container">
                                        <div class="share-label">SHARE THIS ARTICLE</div>
                                        <div class="share-grid">
                                            <button class="share-button twitter" onclick="shareArticle('twitter')">
                                                <span class="share-icon">${twitterIcon}</span>
                                                Twitter
                                            </button>
                                            <button class="share-button linkedin" onclick="shareArticle('linkedin')">
                                                <span class="share-icon">${linkedinIcon}</span>
                                                LinkedIn
                                            </button>
                                            <button class="share-button facebook" onclick="shareArticle('facebook')">
                                                <span class="share-icon">${facebookIcon}</span>
                                                Facebook
                                            </button>
                                            <button class="share-button whatsapp" onclick="shareArticle('whatsapp')">
                                                <span class="share-icon">${whatsappIcon}</span>
                                                WhatsApp
                                            </button>
                                            <button class="share-button copy" onclick="shareArticle('copy')">
                                                <span class="share-icon">${copyIcon}</span>
                                                Copy Link
                                            </button>
                                        </div>
                                    </div>
                                    
                                    ${related.length ? `
                                        <div class="related-section">
                                            <h2>Related Articles</h2>
                                            <div class="related-grid">
                                                ${related.map(rel => `
                                                    <a href="?id=${rel.id}" class="related-article">
                                                        <img src="${rel.image || `https://picsum.photos/400/200?random=${rel.id}`}" alt="${escapeHtml(rel.title)}">
                                                        <h3>${escapeHtml(rel.title)}</h3>
                                                        <div class="related-meta">${rel.readTime || 5} min read</div>
                                                    </a>
                                                `).join('')}
                                            </div>
                                        </div>
                                    ` : ''}
                                    
                                    <div class="post-navigation">
                                        <a href="/" class="nav-link">← Back to Home</a>
                                        <a href="/categories/${escapeHtml(post.category?.toLowerCase() || 'all')}" class="nav-link">More in ${escapeHtml(post.category || 'Articles')} →</a>
                                    </div>
                                </div>
                            </div>
                        </article>
                    `;
                    
                    window.scrollTo(0, 0);
                    
                    // Smooth scroll for TOC links
                    document.querySelectorAll('.toc-link').forEach(link => {
                        link.addEventListener('click', (e) => {
                            e.preventDefault();
                            const targetId = link.getAttribute('href').substring(1);
                            const target = document.getElementById(targetId);
                            if (target) {
                                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }
                        });
                    });
                    
                    setupActiveHighlight();
                    window.addEventListener('scroll', updateProgress);
                    updateProgress();
                    
                } catch (error) {
                    console.error('Error:', error);
                    container.innerHTML = `
                        <div class="error-state">
                            <h2>Unable to Load Article</h2>
                            <p style="margin: 1rem 0; color: #64748b;">${escapeHtml(error.message)}</p>
                            <a href="/" style="color: #3b82f6; text-decoration: none;">← Return to Home</a>
                        </div>
                    `;
                }
            }
            
            loadPost();
        })();
    </script>
</body>
</html>
