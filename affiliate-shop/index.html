<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TREND | Premium Affiliate Store</title>
    <meta name="description" content="Enterprise-grade affiliate marketplace with advanced filtering, quick-view, and real product data.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #fafcff;
            --text-primary: #0a0c10;
            --text-secondary: #475569;
            --border-light: #eef2f6;
            --card-white: #ffffff;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --accent-soft: #f3e8ff;
            --accent-glow: rgba(139,92,246,0.2);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.02), 0 8px 20px rgba(139,92,246,0.05);
            --shadow-md: 0 8px 20px -6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.02);
            --shadow-lg: 0 24px 40px -16px rgba(139,92,246,0.2), 0 4px 12px rgba(0,0,0,0.05);
            --shadow-hover: 0 20px 30px -12px rgba(139,92,246,0.15);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Homepage nav */
        .home-nav {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 200;
        }
        .home-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(139,92,246,0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }
        .home-link:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Hero Section - Redesigned with layers */
        .hero-section {
            position: relative;
            background: radial-gradient(circle at 70% 20%, rgba(139,92,246,0.12), rgba(139,92,246,0.02) 70%, transparent);
            overflow: hidden;
            padding: 4rem 0 3rem;
            border-bottom: none;
        }
        .hero-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 60%;
            height: 200%;
            background: radial-gradient(circle, rgba(139,92,246,0.03), transparent);
            pointer-events: none;
        }
        .hero-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 3rem;
            position: relative;
            z-index: 2;
        }
        .hero-left {
            flex: 1;
        }
        .hero-badge {
            display: inline-block;
            background: rgba(139,92,246,0.12);
            padding: 0.25rem 1rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 1rem;
            backdrop-filter: blur(4px);
        }
        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 0.75rem;
        }
        .hero-gradient {
            background: linear-gradient(120deg, #c084fc, #f472b6, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .hero-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }
        .hero-stats {
            display: flex;
            gap: 1.5rem;
        }
        .hero-stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            border: 1px solid var(--border-light);
        }
        .hero-stat i {
            color: var(--accent);
            font-size: 0.9rem;
        }
        .hero-stat span {
            font-weight: 700;
            font-size: 0.85rem;
        }
        .hero-right {
            flex: 1;
            display: flex;
            gap: 1rem;
            justify-content: center;
            position: relative;
        }
        .floating-card {
            background: white;
            border-radius: 1.5rem;
            padding: 0.5rem;
            box-shadow: var(--shadow-lg);
            width: 140px;
            transform: rotate(-5deg);
            transition: transform 0.3s;
        }
        .floating-card:nth-child(2) {
            transform: rotate(8deg) translateY(20px);
        }
        .floating-card img {
            width: 100%;
            border-radius: 1rem;
            aspect-ratio: 1;
            object-fit: cover;
        }
        .floating-card:hover {
            transform: rotate(0deg) translateY(-8px);
        }

        /* Layout */
        .app-layout {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            min-width: 0;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            justify-content: flex-start;
            gap: 2rem;
            padding: 1rem 0 1.5rem;
            border-bottom: 2px solid var(--border-light);
            margin-bottom: 1.5rem;
        }
        .stat-item {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            background: linear-gradient(135deg, var(--bg-secondary), white);
            padding: 0.5rem 1rem;
            border-radius: 1rem;
            border: 1px solid var(--border-light);
        }
        .stat-number {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Category Chips - Modern */
        .category-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 0 0 1.8rem;
        }
        .cat-chip {
            padding: 0.5rem 1.3rem;
            border-radius: 2rem;
            border: 1px solid var(--border-light);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .cat-chip i {
            font-size: 0.75rem;
            opacity: 0.7;
        }
        .cat-chip:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            background: var(--accent-soft);
        }
        .cat-chip.active {
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(139,92,246,0.3);
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.8rem;
            margin: 1.5rem 0 2rem;
        }
        .product-card {
            background: var(--card-white);
            border-radius: 1.25rem;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            position: relative;
        }
        .product-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 1.25rem;
            padding: 1px;
            background: linear-gradient(135deg, transparent, transparent);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: all 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(139,92,246,0.3);
        }
        .product-card:hover::before {
            background: linear-gradient(135deg, var(--accent), #f472b6);
        }
        .card-media {
            position: relative;
            aspect-ratio: 1/1;
            background: linear-gradient(145deg, #f8fafc, #f1f5f9);
            overflow: hidden;
        }
        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .product-card:hover .card-img {
            transform: scale(1.05);
        }
        .badge-stack {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            max-width: calc(100% - 1.5rem);
        }
        .badge {
            font-size: 0.6rem;
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            font-weight: 700;
            backdrop-filter: blur(4px);
            letter-spacing: -0.2px;
        }
        .badge-sale { background: linear-gradient(135deg, #fee2e2, #fecaca); color: #dc2626; }
        .badge-trend { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #d97706; }
        .badge-bs { background: linear-gradient(135deg, #e0e7ff, #c7d2fe); color: #4f46e5; }
        .quick-view-btn {
            position: absolute;
            bottom: 0.75rem;
            right: 0.75rem;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            border: none;
            padding: 0.3rem 0.9rem;
            border-radius: 2rem;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            font-weight: 500;
        }
        .quick-view-btn:hover {
            background: var(--accent);
            transform: scale(1.05);
        }
        .product-card:hover .quick-view-btn {
            opacity: 1;
        }
        .card-content {
            padding: 0.9rem;
        }
        .product-category {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .product-title {
            font-weight: 700;
            font-size: 1rem;
            margin: 0.4rem 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }
        .rating {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin: 0.3rem 0;
        }
        .stars {
            font-size: 0.9rem;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .price-row {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }
        .current-price {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .old-price {
            font-size: 0.7rem;
            text-decoration: line-through;
            color: var(--text-secondary);
        }
        .shop-btn {
            width: 100%;
            background: linear-gradient(105deg, #1e1b2e, #2d2a3e);
            color: white;
            border: 1px solid rgba(139,92,246,0.2);
            padding: 0.55rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.3rem;
        }
        .shop-btn:hover {
            background: linear-gradient(105deg, var(--accent), #a78bfa);
            border-color: transparent;
            transform: translateY(-1px);
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: linear-gradient(145deg, var(--bg-secondary), white);
            border-radius: 1.5rem;
            grid-column: 1 / -1;
            border: 1px solid var(--border-light);
        }
        .empty-state i {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid var(--border-light);
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 1rem;
            background: var(--bg-secondary);
        }

        /* Modal - Polished */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background: var(--card-white);
            border-radius: 1.5rem;
            max-width: 750px;
            width: 90%;
            max-height: 80vh;
            overflow: auto;
            position: relative;
            padding: 1.5rem;
            border-top: 4px solid var(--accent);
        }
        .modal-close {
            position: absolute;
            top: 0.8rem;
            right: 0.8rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-close:hover {
            background: var(--accent);
            color: white;
        }
        .modal-body {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .modal-img {
            flex: 1;
            min-width: 160px;
        }
        .modal-img img {
            width: 100%;
            border-radius: 1rem;
        }
        .modal-info {
            flex: 1;
        }

        /* Filter Sidebar - Redesigned */
        .filters-sidebar {
            position: sticky;
            top: 2rem;
            width: 300px;
            flex-shrink: 0;
            background: #f9fafb;
            border-radius: 1.25rem;
            height: fit-content;
            max-height: calc(100vh - 4rem);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .filter-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-light);
            background: #f9fafb;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .filter-title-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .filter-title-wrapper i {
            color: var(--accent);
            font-size: 1rem;
        }
        .filter-title-wrapper h3 {
            font-size: 0.9rem;
            font-weight: 600;
        }
        .filter-count-badge {
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            color: white;
            border-radius: 999px;
            padding: 0.1rem 0.5rem;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .reset-all-btn {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            background: transparent;
            border: none;
            font-size: 0.7rem;
            color: var(--accent);
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .reset-all-btn:hover {
            opacity: 0.8;
        }

        .active-filters-strip {
            padding: 0.75rem 1rem;
            background: white;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            position: sticky;
            top: 57px;
            z-index: 9;
        }
        .filter-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            color: white;
            border-radius: 999px;
            padding: 0.25rem 0.9rem;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-pill:hover {
            transform: scale(0.95);
            opacity: 0.9;
        }
        .filter-pill i {
            font-size: 0.65rem;
        }

        .filter-sections {
            flex: 1;
            overflow-y: auto;
            padding: 0.25rem 0 1rem;
        }

        .filter-sections::-webkit-scrollbar {
            width: 4px;
        }
        .filter-sections::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 4px;
        }
        .filter-sections::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        .filter-group {
            border-bottom: 1px solid var(--border-light);
            padding: 0.75rem 1.25rem;
        }
        .section-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            padding: 0.25rem 0;
        }
        .section-button span {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .chevron-icon {
            color: var(--text-secondary);
            font-size: 0.75rem;
            transition: transform 0.2s;
        }

        .section-content {
            margin-top: 0.75rem;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .checkbox-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 0.25rem;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0.2rem 0;
        }
        .checkbox-label:hover {
            color: var(--accent);
        }
        .checkbox-label input {
            width: 1rem;
            height: 1rem;
            accent-color: var(--accent);
            cursor: pointer;
        }
        .item-count {
            margin-left: auto;
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        .price-inputs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .price-field {
            flex: 1;
        }
        .price-field label {
            display: block;
            font-size: 0.6rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }
        .price-field input {
            width: 100%;
            padding: 0.5rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-light);
            background: var(--bg-primary);
            font-size: 0.7rem;
        }
        .price-field input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .price-actions {
            display: flex;
            gap: 0.5rem;
        }
        .apply-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            color: white;
            border: none;
            padding: 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .apply-btn:hover {
            transform: translateY(-1px);
        }
        .reset-price-btn {
            padding: 0.5rem 1rem;
            background: white;
            border: 1px solid var(--border-light);
            border-radius: 0.5rem;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reset-price-btn:hover {
            background: var(--bg-secondary);
        }

        .rating-stars-btn {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            width: 100%;
            padding: 0.5rem 0.75rem;
            border-radius: 0.75rem;
            background: white;
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
        }
        .rating-stars-btn.active {
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            color: white;
            border-color: transparent;
        }
        .rating-stars-btn.active .star-icon {
            color: white !important;
        }
        .stars-container {
            display: flex;
            gap: 0.125rem;
        }
        .star-icon {
            font-size: 0.75rem;
        }
        .rating-text {
            font-size: 0.75rem;
            font-weight: 500;
        }

        .availability-options {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .availability-label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0.2rem 0;
        }
        .availability-label:hover {
            color: var(--accent);
        }
        .availability-label input {
            width: 1rem;
            height: 1rem;
            accent-color: var(--accent);
            cursor: pointer;
        }
        .availability-label i {
            width: 1.2rem;
            font-size: 0.85rem;
        }

        @media (max-width: 1100px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); }
            .hero-container { flex-direction: column; text-align: center; }
            .hero-left { text-align: center; }
            .hero-stats { justify-content: center; }
        }
        @media (max-width: 900px) {
            .app-layout { flex-direction: column; }
            .filters-sidebar { width: 100%; max-height: 400px; position: relative; top: 0; }
            .filter-sections { max-height: 280px; }
        }
        @media (max-width: 640px) {
            .products-grid { grid-template-columns: 1fr; }
            .hero-title { font-size: 2rem; }
            .hero-container { padding: 0 1rem; }
            .floating-card { width: 100px; }
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; gap: 1rem;">
            <div style="width: 40px; height: 40px; border: 3px solid var(--border-light); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
            <p>Loading products...</p>
        </div>
    </div>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <script>
        // Mock product data
        const MOCK_PRODUCTS = [
            { id: 1, name: 'Sony WH-1000XM5 Wireless Headphones', price: 399, compareAtPrice: 499, image: 'https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?w=400&h=400&fit=crop', category: 'Electronics', rating: 4.8, reviews: 15420, trending: true, discount: 20, inStock: true, brand: 'Sony', bestseller: true },
            { id: 2, name: 'Apple AirPods Pro 2nd Gen', price: 249, compareAtPrice: 299, image: 'https://images.unsplash.com/photo-1600294037681-c80b4cb5b434?w=400&h=400&fit=crop', category: 'Electronics', rating: 4.7, reviews: 28750, trending: true, discount: 17, inStock: true, brand: 'Apple', bestseller: false },
            { id: 3, name: 'Dyson V15 Detect Absolute', price: 749, compareAtPrice: 899, image: 'https://images.unsplash.com/photo-1558317374-067fb5f30001?w=400&h=400&fit=crop', category: 'Home', rating: 4.9, reviews: 8950, trending: false, discount: 17, inStock: true, brand: 'Dyson', bestseller: true },
            { id: 4, name: 'The Psychology of Money', price: 16.99, compareAtPrice: 24.99, image: 'https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=400&h=400&fit=crop', category: 'Books', rating: 4.8, reviews: 45230, trending: true, discount: 32, inStock: true, brand: 'Housel', bestseller: false },
            { id: 5, name: 'Samsung QLED 65" 4K Smart TV', price: 1299, compareAtPrice: 1799, image: 'https://images.unsplash.com/photo-1593784991095-a205069470b6?w=400&h=400&fit=crop', category: 'Electronics', rating: 4.6, reviews: 3420, trending: false, discount: 28, inStock: true, brand: 'Samsung', bestseller: true },
            { id: 6, name: 'Lululemon Align High-Rise Leggings', price: 98, compareAtPrice: 128, image: 'https://images.unsplash.com/photo-1594381898411-846e7d193883?w=400&h=400&fit=crop', category: 'Fashion', rating: 4.7, reviews: 12450, trending: true, discount: 23, inStock: true, brand: 'Lululemon', bestseller: false },
            { id: 7, name: 'Instant Pot Duo 7-in-1 Pressure Cooker', price: 89.99, compareAtPrice: 149.99, image: 'https://images.unsplash.com/photo-1585515320310-259814833e62?w=400&h=400&fit=crop', category: 'Home', rating: 4.6, reviews: 198340, trending: false, discount: 40, inStock: true, brand: 'Instant', bestseller: true },
            { id: 8, name: 'Nintendo Switch OLED Model', price: 349, compareAtPrice: 399, image: 'https://images.unsplash.com/photo-1612311298373-4cbcd2b04e70?w=400&h=400&fit=crop', category: 'Gaming', rating: 4.8, reviews: 32450, trending: true, discount: 13, inStock: true, brand: 'Nintendo', bestseller: false },
            { id: 9, name: 'Apple MacBook Pro 14" M3', price: 1999, compareAtPrice: 2299, image: 'https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=400&h=400&fit=crop', category: 'Electronics', rating: 4.9, reviews: 8920, trending: true, discount: 13, inStock: true, brand: 'Apple', bestseller: true }
        ];

        let PRODUCTS = [];
        let categories = [];
        let minPriceLimit = 0;
        let maxPriceLimit = 10000;
        let onSaleCount = 0;

        // Filter state
        let filters = {
            categories: [],
            minPrice: 0,
            maxPrice: 10000,
            minRating: 0,
            inStockOnly: false,
            onSaleOnly: false,
            freeShippingOnly: false
        };

        let activeCategory = 'all';
        let expandedSections = {
            categories: true,
            price: true,
            rating: true,
            availability: true
        };
        let localPriceRange = { min: 0, max: 10000 };
        let quickViewProduct = null;

        async function loadProducts() {
            try {
                const response = await fetch('/affiliate-shop/data/products.json');
                if (response.ok) {
                    const data = await response.json();
                    PRODUCTS = data.products || data;
                } else {
                    throw new Error('Using mock data');
                }
            } catch (error) {
                PRODUCTS = MOCK_PRODUCTS;
            }

            const catMap = new Map();
            let minPrice = Infinity;
            let maxPrice = -Infinity;
            let onSale = 0;

            PRODUCTS.forEach(p => {
                if (!catMap.has(p.category)) {
                    catMap.set(p.category, { id: p.category, name: p.category, count: 0 });
                }
                catMap.get(p.category).count++;

                if (p.price < minPrice) minPrice = p.price;
                if (p.price > maxPrice) maxPrice = p.price;
                if (p.discount > 0) onSale++;
            });

            categories = Array.from(catMap.values());
            minPriceLimit = Math.floor(minPrice);
            maxPriceLimit = Math.ceil(maxPrice);
            onSaleCount = onSale;

            filters.minPrice = minPriceLimit;
            filters.maxPrice = maxPriceLimit;
            localPriceRange = { min: minPriceLimit, max: maxPriceLimit };

            render();
        }

        function getFilteredProducts() {
            let filtered = [...PRODUCTS];
            
            if (activeCategory !== 'all') {
                filtered = filtered.filter(p => p.category === activeCategory);
            }
            
            if (filters.categories.length > 0) {
                filtered = filtered.filter(p => filters.categories.includes(p.category));
            }
            
            if (filters.minPrice > minPriceLimit) {
                filtered = filtered.filter(p => p.price >= filters.minPrice);
            }
            
            if (filters.maxPrice < maxPriceLimit) {
                filtered = filtered.filter(p => p.price <= filters.maxPrice);
            }
            
            if (filters.minRating > 0) {
                filtered = filtered.filter(p => p.rating >= filters.minRating);
            }
            
            if (filters.inStockOnly) {
                filtered = filtered.filter(p => p.inStock);
            }
            
            if (filters.onSaleOnly) {
                filtered = filtered.filter(p => p.discount > 0);
            }
            
            return filtered;
        }

        function activeFiltersCount() {
            let count = 0;
            if (filters.categories.length) count += filters.categories.length;
            if (filters.minPrice > minPriceLimit) count++;
            if (filters.maxPrice < maxPriceLimit) count++;
            if (filters.minRating > 0) count++;
            if (filters.inStockOnly) count++;
            if (filters.onSaleOnly) count++;
            if (filters.freeShippingOnly) count++;
            return count;
        }

        function handleCategoryChange(categoryId) {
            const newCategories = filters.categories.includes(categoryId)
                ? filters.categories.filter(c => c !== categoryId)
                : [...filters.categories, categoryId];
            filters.categories = newCategories;
            render();
        }

        function handleRatingChange(rating) {
            filters.minRating = filters.minRating === rating ? 0 : rating;
            render();
        }

        function handlePriceChange(type, value) {
            localPriceRange[type] = parseInt(value) || 0;
            render();
        }

        function applyPriceRange() {
            filters.minPrice = localPriceRange.min;
            filters.maxPrice = localPriceRange.max;
            render();
        }

        function resetPriceRange() {
            localPriceRange = { min: minPriceLimit, max: maxPriceLimit };
            filters.minPrice = minPriceLimit;
            filters.maxPrice = maxPriceLimit;
            render();
        }

        function handleCheckboxChange(key, value) {
            filters[key] = value;
            render();
        }

        function clearFilter(filterType, value) {
            switch (filterType) {
                case 'category':
                    filters.categories = filters.categories.filter(c => c !== value);
                    break;
                case 'minPrice':
                    filters.minPrice = minPriceLimit;
                    localPriceRange.min = minPriceLimit;
                    break;
                case 'maxPrice':
                    filters.maxPrice = maxPriceLimit;
                    localPriceRange.max = maxPriceLimit;
                    break;
                case 'rating':
                    filters.minRating = 0;
                    break;
                case 'inStockOnly':
                    filters.inStockOnly = false;
                    break;
                case 'onSaleOnly':
                    filters.onSaleOnly = false;
                    break;
                case 'freeShippingOnly':
                    filters.freeShippingOnly = false;
                    break;
            }
            render();
        }

        function resetAllFilters() {
            activeCategory = 'all';
            filters = {
                categories: [],
                minPrice: minPriceLimit,
                maxPrice: maxPriceLimit,
                minRating: 0,
                inStockOnly: false,
                onSaleOnly: false,
                freeShippingOnly: false
            };
            localPriceRange = { min: minPriceLimit, max: maxPriceLimit };
            render();
        }

        function toggleSection(section) {
            expandedSections[section] = !expandedSections[section];
            render();
        }

        function renderStars(rating) {
            const full = Math.floor(rating);
            const half = rating % 1 >= 0.5 ? 1 : 0;
            const empty = 5 - full - half;
            return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        function render() {
            const filtered = getFilteredProducts();
            const activeCount = activeFiltersCount();
            const avgRating = (PRODUCTS.reduce((sum, p) => sum + (p.rating || 0), 0) / PRODUCTS.length).toFixed(1);

            const html = `
                <div class="home-nav">
                    <a href="/" class="home-link">
                        <i class="fas fa-arrow-left"></i> Homepage
                    </a>
                </div>

                <section class="hero-section">
                    <div class="hero-container">
                        <div class="hero-left">
                            <div class="hero-badge">
                                <i class="fas fa-bolt"></i> TRENDING NOW
                            </div>
                            <h1 class="hero-title">Curated <span class="hero-gradient">premium picks</span></h1>
                            <p class="hero-subtitle">Hand-picked products from top brands — exclusive affiliate deals</p>
                            <div class="hero-stats">
                                <div class="hero-stat"><i class="fas fa-store"></i><span>500+ Brands</span></div>
                                <div class="hero-stat"><i class="fas fa-tag"></i><span>Up to 40% OFF</span></div>
                                <div class="hero-stat"><i class="fas fa-truck"></i><span>Free Shipping</span></div>
                            </div>
                        </div>
                        <div class="hero-right">
                            <div class="floating-card"><img src="${MOCK_PRODUCTS[0].image}" alt="trending"></div>
                            <div class="floating-card"><img src="${MOCK_PRODUCTS[4].image}" alt="trending"></div>
                        </div>
                    </div>
                </section>

                <div class="app-layout">
                    <aside class="filters-sidebar">
                        <div class="filter-header">
                            <div class="filter-title-wrapper">
                                <i class="fas fa-sliders-h"></i>
                                <h3>Filters</h3>
                                ${activeCount > 0 ? `<span class="filter-count-badge">${activeCount}</span>` : ''}
                            </div>
                            ${activeCount > 0 ? `
                                <button class="reset-all-btn" id="resetAllBtn">
                                    <i class="fas fa-sync-alt"></i> Reset all
                                </button>
                            ` : ''}
                        </div>

                        ${activeCount > 0 ? `
                        <div class="active-filters-strip">
                            ${filters.categories.map(cat => `
                                <span class="filter-pill" data-type="category" data-val="${cat}">
                                    ${cat} <i class="fas fa-times"></i>
                                </span>
                            `).join('')}
                            ${filters.minPrice > minPriceLimit ? `
                                <span class="filter-pill" data-type="minPrice">
                                    Min: $${filters.minPrice} <i class="fas fa-times"></i>
                                </span>
                            ` : ''}
                            ${filters.maxPrice < maxPriceLimit ? `
                                <span class="filter-pill" data-type="maxPrice">
                                    Max: $${filters.maxPrice} <i class="fas fa-times"></i>
                                </span>
                            ` : ''}
                            ${filters.minRating > 0 ? `
                                <span class="filter-pill" data-type="rating">
                                    ${filters.minRating}+ Stars <i class="fas fa-times"></i>
                                </span>
                            ` : ''}
                            ${filters.inStockOnly ? `
                                <span class="filter-pill" data-type="inStockOnly">
                                    In Stock <i class="fas fa-times"></i>
                                </span>
                            ` : ''}
                            ${filters.onSaleOnly ? `
                                <span class="filter-pill" data-type="onSaleOnly">
                                    On Sale <i class="fas fa-times"></i>
                                </span>
                            ` : ''}
                        </div>
                        ` : ''}

                        <div class="filter-sections">
                            <div class="filter-group">
                                <button class="section-button" data-section="categories">
                                    <span><i class="fas fa-folder"></i> Categories</span>
                                    <i class="fas ${expandedSections.categories ? 'fa-chevron-up' : 'fa-chevron-down'} chevron-icon"></i>
                                </button>
                                ${expandedSections.categories ? `
                                <div class="section-content">
                                    <div class="checkbox-list">
                                        ${categories.map(cat => `
                                            <label class="checkbox-label">
                                                <input type="checkbox" data-cat="${cat.id}" ${filters.categories.includes(cat.id) ? 'checked' : ''}>
                                                <span>${cat.name}</span>
                                                <span class="item-count">(${cat.count})</span>
                                            </label>
                                        `).join('')}
                                    </div>
                                </div>
                                ` : ''}
                            </div>

                            <div class="filter-group">
                                <button class="section-button" data-section="price">
                                    <span><i class="fas fa-dollar-sign"></i> Price Range</span>
                                    <i class="fas ${expandedSections.price ? 'fa-chevron-up' : 'fa-chevron-down'} chevron-icon"></i>
                                </button>
                                ${expandedSections.price ? `
                                <div class="section-content">
                                    <div class="price-inputs">
                                        <div class="price-field">
                                            <label>Min ($)</label>
                                            <input type="number" id="priceMin" value="${localPriceRange.min}">
                                        </div>
                                        <div class="price-field">
                                            <label>Max ($)</label>
                                            <input type="number" id="priceMax" value="${localPriceRange.max === maxPriceLimit ? '' : localPriceRange.max}" placeholder="${maxPriceLimit}">
                                        </div>
                                    </div>
                                    <div class="price-actions">
                                        <button class="apply-btn" id="applyPriceBtn">Apply</button>
                                        <button class="reset-price-btn" id="resetPriceBtn">Reset</button>
                                    </div>
                                </div>
                                ` : ''}
                            </div>

                            <div class="filter-group">
                                <button class="section-button" data-section="rating">
                                    <span><i class="fas fa-star"></i> Customer Rating</span>
                                    <i class="fas ${expandedSections.rating ? 'fa-chevron-up' : 'fa-chevron-down'} chevron-icon"></i>
                                </button>
                                ${expandedSections.rating ? `
                                <div class="section-content">
                                    ${[5, 4, 3, 2, 1].map(r => `
                                        <div class="rating-stars-btn ${filters.minRating === r ? 'active' : ''}" data-rating="${r}">
                                            <div class="stars-container">
                                                ${[1,2,3,4,5].map(star => `
                                                    <i class="fas fa-star star-icon" style="color: ${star <= r ? '#fbbf24' : '#cbd5e1'}"></i>
                                                `).join('')}
                                            </div>
                                            <span class="rating-text">& Up</span>
                                        </div>
                                    `).join('')}
                                </div>
                                ` : ''}
                            </div>

                            <div class="filter-group">
                                <button class="section-button" data-section="availability">
                                    <span><i class="fas fa-box"></i> Availability</span>
                                    <i class="fas ${expandedSections.availability ? 'fa-chevron-up' : 'fa-chevron-down'} chevron-icon"></i>
                                </button>
                                ${expandedSections.availability ? `
                                <div class="section-content">
                                    <div class="availability-options">
                                        <label class="availability-label">
                                            <input type="checkbox" id="inStockCheck" ${filters.inStockOnly ? 'checked' : ''}>
                                            <i class="fas fa-boxes"></i> In Stock Only
                                        </label>
                                        <label class="availability-label">
                                            <input type="checkbox" id="onSaleCheck" ${filters.onSaleOnly ? 'checked' : ''}>
                                            <i class="fas fa-tag"></i> On Sale Only
                                        </label>
                                        <label class="availability-label">
                                            <input type="checkbox" id="freeShippingCheck" ${filters.freeShippingOnly ? 'checked' : ''}>
                                            <i class="fas fa-truck"></i> Free Shipping Only
                                        </label>
                                    </div>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    </aside>

                    <main class="main-content">
                        <div class="stats-row">
                            <div class="stat-item"><span class="stat-number">${PRODUCTS.length}</span><span class="stat-label">Premium Products</span></div>
                            <div class="stat-item"><span class="stat-number">${avgRating} ★</span><span class="stat-label">Avg Rating</span></div>
                            <div class="stat-item"><span class="stat-number">${onSaleCount}</span><span class="stat-label">On Sale</span></div>
                        </div>

                        <div class="category-strip">
                            <button class="cat-chip ${activeCategory === 'all' ? 'active' : ''}" data-cat="all"><i class="fas fa-th-large"></i> All</button>
                            ${categories.map(c => {
                                const icons = { Electronics: '📱', Fashion: '👕', Home: '🏠', Books: '📚', Gaming: '🎮' };
                                return `<button class="cat-chip ${activeCategory === c.id ? 'active' : ''}" data-cat="${c.id}"><i class="fas fa-${c.id === 'Electronics' ? 'mobile-alt' : c.id === 'Fashion' ? 'tshirt' : c.id === 'Home' ? 'home' : c.id === 'Books' ? 'book' : 'gamepad'}"></i> ${c.name}</button>`;
                            }).join('')}
                        </div>

                        <div class="products-grid">
                            ${filtered.map(p => `
                                <div class="product-card" data-product='${JSON.stringify(p)}'>
                                    <div class="card-media">
                                        <div class="badge-stack">
                                            ${p.bestseller ? '<span class="badge badge-bs">🏆 Bestseller</span>' : ''}
                                            ${p.trending ? '<span class="badge badge-trend">🔥 Trending</span>' : ''}
                                            ${p.discount > 0 ? `<span class="badge badge-sale">-${p.discount}%</span>` : ''}
                                        </div>
                                        <img class="card-img" src="${p.image}" alt="${escapeHtml(p.name)}" loading="lazy">
                                        <button class="quick-view-btn" data-id="${p.id}"><i class="fas fa-eye"></i> Quick View</button>
                                    </div>
                                    <div class="card-content">
                                        <div class="product-category">${p.category}</div>
                                        <div class="product-title">${escapeHtml(p.name)}</div>
                                        <div class="rating"><div class="stars">${renderStars(p.rating || 0)}</div><span style="font-size:0.65rem;">(${(p.reviews || 0).toLocaleString()})</span></div>
                                        <div class="price-row"><span class="current-price">$${p.price.toFixed(2)}</span>${p.compareAtPrice ? `<span class="old-price">$${p.compareAtPrice.toFixed(2)}</span>` : ''}</div>
                                        <button class="shop-btn"><i class="fas fa-shopping-cart"></i> Shop now →</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        ${filtered.length === 0 ? '<div class="empty-state"><i class="fas fa-filter"></i><p>No products match your filters.</p><button class="reset-all-btn" style="margin-top:0.5rem;">Clear all filters</button></div>' : ''}
                    </main>
                </div>
                <footer><i class="fas fa-store"></i> As an affiliate partner, we earn from qualifying purchases. | © 2025 TREND</footer>
                ${quickViewProduct ? modalHtml(quickViewProduct) : ''}
            `;
            document.getElementById('root').innerHTML = html;
            attachEvents();
        }

        function modalHtml(product) {
            return `
                <div class="modal" id="quickViewModal">
                    <div class="modal-content">
                        <button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button>
                        <div class="modal-body">
                            <div class="modal-img"><img src="${product.image}" alt="${product.name}"></div>
                            <div class="modal-info">
                                <div class="product-category">${product.category}</div>
                                <h2 style="font-size:1.2rem; margin:0.5rem 0; font-weight:700;">${escapeHtml(product.name)}</h2>
                                <div class="rating"><div class="stars">${renderStars(product.rating || 0)}</div><span>(${(product.reviews || 0).toLocaleString()} reviews)</span></div>
                                <div class="price-row"><span class="current-price">$${product.price.toFixed(2)}</span>${product.compareAtPrice ? `<span class="old-price">$${product.compareAtPrice.toFixed(2)}</span>` : ''}</div>
                                <p style="margin:1rem 0; color:var(--text-secondary);">⭐ Premium quality with 4.7+ average rating. Free shipping available on orders over $50.</p>
                                <button class="shop-btn" style="width:auto; padding:0.6rem 1.5rem;">Purchase now →</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function attachEvents() {
            document.querySelectorAll('.cat-chip').forEach(btn => {
                btn.addEventListener('click', () => {
                    activeCategory = btn.dataset.cat;
                    render();
                });
            });

            document.querySelectorAll('.section-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const txt = btn.innerText.toLowerCase();
                    if (txt.includes('categories')) toggleSection('categories');
                    else if (txt.includes('price')) toggleSection('price');
                    else if (txt.includes('rating')) toggleSection('rating');
                    else if (txt.includes('availability')) toggleSection('availability');
                });
            });

            document.querySelectorAll('input[data-cat]').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    handleCategoryChange(e.target.dataset.cat);
                });
            });

            const priceMin = document.getElementById('priceMin');
            const priceMax = document.getElementById('priceMax');
            if (priceMin) priceMin.addEventListener('change', (e) => handlePriceChange('min', e.target.value));
            if (priceMax) priceMax.addEventListener('change', (e) => handlePriceChange('max', e.target.value));

            const applyBtn = document.getElementById('applyPriceBtn');
            const resetPriceBtn = document.getElementById('resetPriceBtn');
            if (applyBtn) applyBtn.addEventListener('click', applyPriceRange);
            if (resetPriceBtn) resetPriceBtn.addEventListener('click', resetPriceRange);

            document.querySelectorAll('.rating-stars-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const rating = parseInt(btn.dataset.rating);
                    handleRatingChange(rating);
                });
            });

            const inStockCheck = document.getElementById('inStockCheck');
            const onSaleCheck = document.getElementById('onSaleCheck');
            const freeShippingCheck = document.getElementById('freeShippingCheck');
            if (inStockCheck) inStockCheck.addEventListener('change', (e) => handleCheckboxChange('inStockOnly', e.target.checked));
            if (onSaleCheck) onSaleCheck.addEventListener('change', (e) => handleCheckboxChange('onSaleOnly', e.target.checked));
            if (freeShippingCheck) freeShippingCheck.addEventListener('change', (e) => handleCheckboxChange('freeShippingOnly', e.target.checked));

            document.querySelectorAll('.filter-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    const type = pill.dataset.type;
                    const val = pill.dataset.val;
                    if (type && val) clearFilter(type, val);
                    else if (type) clearFilter(type);
                });
            });

            const resetAllBtn = document.getElementById('resetAllBtn');
            if (resetAllBtn) resetAllBtn.addEventListener('click', resetAllFilters);

            document.querySelectorAll('.quick-view-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const card = btn.closest('.product-card');
                    if (card) {
                        quickViewProduct = JSON.parse(card.dataset.product);
                        render();
                    }
                });
            });

            document.querySelectorAll('.shop-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    alert('🔗 Affiliate link: You would be redirected to the official store.');
                });
            });

            const closeModal = document.getElementById('closeModal');
            const modal = document.getElementById('quickViewModal');
            if (closeModal) closeModal.addEventListener('click', () => { quickViewProduct = null; render(); });
            if (modal) modal.addEventListener('click', (e) => { if (e.target.id === 'quickViewModal') { quickViewProduct = null; render(); } });
        }

        loadProducts();
    </script>
</body>
</html>
