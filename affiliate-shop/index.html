<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TRENDLIN | Discover Trending Products</title>
    <meta name="description" content="TRENDLIN — Discover and explore trending products across 7 categories. Professional marketplace for product discovery.">
    <meta name="theme-color" content="#0f172a">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :focus {
            outline: none;
        }
        :focus-visible {
            outline: 2px solid #2563eb;
            outline-offset: 2px;
            border-radius: 6px;
        }

        button, a, .category-card, .trending-card, .product-card, .cat-chip,
        .filter-pill, .reset-btn, .trending-nav-btn, .quick-view, .shop-btn,
        .apply-price, .checkbox-label, .rating-option, .modal-close, .page-btn {
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        button:active, a:active, .trending-card:active, .product-card:active,
        .cat-chip:active, .filter-pill:active, .reset-btn:active, .trending-nav-btn:active,
        .quick-view:active, .shop-btn:active, .apply-price:active, .rating-option:active,
        .page-btn:active {
            transform: scale(0.96);
            opacity: 0.85;
            transition-duration: 0.05s;
        }

        @media (hover: hover) {
            .trending-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 20px 35px -12px rgba(0,0,0,0.12);
                border-color: #2563eb;
            }
            .product-card:hover {
                transform: translateY(-3px);
                box-shadow: 0 20px 35px -12px rgba(0,0,0,0.12);
                border-color: #2563eb;
            }
            .cat-chip:hover:not(.active) {
                background: #eef2ff;
                border-color: #2563eb;
            }
            .page-btn:hover:not(.active):not(.disabled) {
                background: #eef2ff;
                border-color: #2563eb;
            }
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #fafbfc;
            --bg-tertiary: #f0f2f5;
            --text-primary: #1a1a2e;
            --text-secondary: #5a6e8a;
            --text-muted: #8e9eae;
            --border-light: #eef2f5;
            --border-medium: #dce3e9;
            --accent: #2563eb;
            --accent-dark: #1d4ed8;
            --accent-light: #3b82f6;
            --accent-bg: #eff6ff;
            --accent-soft: #dbeafe;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.04);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.06);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
        }

        .site-header {
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
            z-index: 100;
            padding: 0.875rem 1.5rem;
        }
        .nav-container {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            text-decoration: none;
        }
        .logo span {
            font-weight: 400;
            color: var(--accent);
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            text-decoration: none;
            padding: 0.4rem 1rem;
            border-radius: 0.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
        }
        @media (hover: hover) {
            .nav-link:hover {
                background: var(--accent);
                color: white;
                border-color: var(--accent);
            }
        }

        .hero {
            background: linear-gradient(135deg, #f0f9ff 0%, #e8f0fe 100%);
            border-bottom: 1px solid var(--border-light);
            padding: 2.5rem 1.5rem;
        }
        .hero-container {
            max-width: 1440px;
            margin: 0 auto;
        }
        .hero-content {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 2rem;
        }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--accent-soft);
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent-dark);
            margin-bottom: 1rem;
        }
        .hero h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }
        .hero p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .trending-exploration {
            background: white;
            border-radius: 1rem;
            border: 1px solid var(--border-light);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }
        .trending-header {
            background: white;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .trending-title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .trending-title i {
            color: var(--accent);
            font-size: 1rem;
        }
        .trending-title h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .trending-nav {
            display: flex;
            gap: 0.5rem;
        }
        .trending-nav-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-secondary);
        }
        @media (hover: hover) {
            .trending-nav-btn:hover {
                background: var(--accent);
                color: white;
                border-color: var(--accent);
            }
        }
        .trending-carousel {
            padding: 1rem;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: thin;
        }
        .trending-carousel::-webkit-scrollbar {
            height: 5px;
        }
        .trending-track {
            display: flex;
            gap: 1rem;
            width: max-content;
        }
        .trending-card {
            width: 220px;
            background: white;
            border: 1px solid var(--border-light);
            border-radius: 0.75rem;
            overflow: hidden;
            cursor: pointer;
            flex-shrink: 0;
        }
        .trending-card-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            background: var(--bg-secondary);
            pointer-events: none;
        }
        .trending-card-info {
            padding: 0.7rem;
        }
        .trending-card-category {
            font-size: 0.55rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
        }
        .trending-card-name {
            font-weight: 600;
            font-size: 0.75rem;
            margin: 0.2rem 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .trending-card-price {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--accent-dark);
        }
        .trending-badge {
            display: inline-block;
            background: #e74c3c;
            color: white;
            font-size: 0.5rem;
            padding: 0.1rem 0.45rem;
            border-radius: 1rem;
            margin-top: 0.2rem;
        }

        .app-layout {
            max-width: 1440px;
            margin: 2rem auto 0;
            padding: 0 1.5rem 2rem;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        .product-card {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: 0.85rem;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .product-img-container {
            position: relative;
            aspect-ratio: 1;
            background: var(--bg-secondary);
            overflow: hidden;
        }
        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
            pointer-events: none;
        }
        @media (hover: hover) {
            .product-card:hover .product-img { transform: scale(1.03); }
        }
        .product-badges {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
            pointer-events: none;
        }
        .badge { font-size: 0.5rem; padding: 0.15rem 0.55rem; border-radius: 2rem; font-weight: 600; }
        .badge-sale { background: #fef2f2; color: #dc2626; }
        .badge-trend { background: #fffbeb; color: #d97706; }
        .badge-best { background: #eff6ff; color: #2563eb; }
        .quick-view {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            border: none;
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            color: white;
            font-size: 0.55rem;
            font-weight: 500;
            cursor: pointer;
        }
        .product-info { padding: 0.7rem; }
        .product-category { font-size: 0.55rem; font-weight: 600; color: var(--accent); text-transform: uppercase; }
        .product-title {
            font-weight: 700;
            font-size: 0.8rem;
            margin: 0.25rem 0;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .rating { display: flex; align-items: center; gap: 0.3rem; margin: 0.25rem 0; }
        .stars { font-size: 0.65rem; color: #fbbf24; letter-spacing: 1px; }
        .price { display: flex; align-items: baseline; gap: 0.5rem; margin: 0.35rem 0; }
        .current-price { font-size: 0.9rem; font-weight: 800; color: var(--accent-dark); }
        .old-price { font-size: 0.6rem; text-decoration: line-through; color: var(--text-muted); }
        .shop-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.35rem;
        }
        .empty-state {
            grid-column: span 2;
            text-align: center;
            padding: 2rem;
            background: var(--bg-secondary);
            border-radius: 1rem;
        }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }
        .modal-content {
            background: white;
            border-radius: 1rem;
            max-width: 400px;
            width: 100%;
            padding: 1.2rem;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 0.6rem;
            right: 0.6rem;
            background: var(--bg-tertiary);
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
        }
        footer {
            text-align: center;
            padding: 1.25rem;
            border-top: 1px solid var(--border-light);
            font-size: 0.65rem;
            color: var(--text-muted);
            background: var(--bg-secondary);
        }

        /* Category Strip */
        .category-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-light);
        }
        .cat-chip {
            padding: 0.4rem 1.1rem;
            border-radius: 2rem;
            border: 1px solid var(--border-light);
            background: white;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .cat-chip.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-light);
        }
        .stat-card {
            background: var(--bg-secondary);
            padding: 0.4rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            border: 1px solid var(--border-light);
        }
        .stat-number { font-size: 0.95rem; font-weight: 700; color: var(--accent-dark); }
        .stat-label { font-size: 0.6rem; color: var(--text-secondary); }

        /* Sort Dropdown */
        .sort-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.5rem;
        }
        .sort-select {
            padding: 0.4rem 1rem;
            border: 1px solid var(--border-light);
            border-radius: 0.5rem;
            font-size: 0.7rem;
            background: white;
            cursor: pointer;
        }

        @media (min-width: 1024px) {
            .products-grid { grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
            .quick-view { opacity: 0; }
            .product-card:hover .quick-view { opacity: 1; }
            .hero h1 { font-size: 2.5rem; }
            .trending-card { width: 250px; }
        }
        @media (min-width: 1400px) {
            .products-grid { grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
            .hero h1 { font-size: 3rem; }
        }

        .loader-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4rem;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-light);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
<header class="site-header">
    <div class="nav-container">
        <a href="/" class="logo">TRENDLIN<span>.</span></a>
        <a href="/" class="nav-link"><i class="fas fa-arrow-left"></i> Home</a>
    </div>
</header>

<section class="hero">
    <div class="hero-container">
        <div class="hero-content">
            <div class="hero-badge"><i class="fas fa-compass"></i> DISCOVER WHAT'S TRENDING</div>
            <h1>Explore trending products.</h1>
            <p>Curated picks across 7 categories — from cutting-edge tech to lifestyle essentials</p>
        </div>
        <div class="trending-exploration">
            <div class="trending-header">
                <div class="trending-title"><i class="fas fa-fire"></i><h3>🔥 Trending Now · Most Popular This Week</h3></div>
                <div class="trending-nav">
                    <button class="trending-nav-btn" id="trendingPrevBtn"><i class="fas fa-chevron-left"></i></button>
                    <button class="trending-nav-btn" id="trendingNextBtn"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="trending-carousel" id="trendingCarousel">
                <div class="trending-track" id="trendingTrack"></div>
            </div>
        </div>
    </div>
</section>

<div class="app-layout" id="app">
    <div class="loader-spinner"><div class="spinner"></div></div>
</div>

<footer><i class="fas fa-compass"></i> TRENDLIN — Product discovery & exploration | © 2025</footer>

<!-- External JavaScript file -->
<script src="/assets/js/affiliate-shop.js"></script>
</body>
</html>
