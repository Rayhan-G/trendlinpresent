<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Trendlin | Figma Premium Navbar</title>
    <!-- Google Fonts: Figma favorites - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 - Using latest CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            min-height: 100vh;
        }

        /* Design tokens (Figma variables style) */
        :root {
            --spacing-2: 2px;
            --spacing-4: 4px;
            --spacing-6: 6px;
            --spacing-8: 8px;
            --spacing-10: 10px;
            --spacing-12: 12px;
            --spacing-16: 16px;
            --spacing-20: 20px;
            --spacing-24: 24px;
            --spacing-32: 32px;
            --spacing-40: 40px;
            --spacing-48: 48px;
            --spacing-64: 64px;
            
            --color-primary: #18181B;
            --color-secondary: #3F3F46;
            --color-tertiary: #71717A;
            --color-accent: #6366F1;
            --color-accent-light: #818CF8;
            --color-accent-gradient-start: #6366F1;
            --color-accent-gradient-end: #8B5CF6;
            --color-success: #10B981;
            --color-warning: #F59E0B;
            --color-border: #E4E4E7;
            --color-bg: #FFFFFF;
            --color-bg-secondary: #FAFAFA;
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.01);
        }

        .site-header {
            background: var(--color-bg);
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 var(--spacing-32);
        }

        @media (max-width: 1024px) {
            .container {
                padding: 0 var(--spacing-24);
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 0 var(--spacing-16);
            }
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-16) 0;
            gap: var(--spacing-48);
        }

        /* Logo - Updated to match footer trendlin style */
        .logo a {
            text-decoration: none;
            display: flex;
            align-items: baseline;
            gap: 0;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1a1a1a 0%, #404040 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-dot {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e11d48 0%, #f43f5e 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Navigation */
        .main-nav ul {
            display: flex;
            gap: var(--spacing-8);
            list-style: none;
            margin: 0;
            padding: 0;
            align-items: center;
        }

        .main-nav li {
            position: relative;
        }

        .main-nav a {
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--color-secondary);
            transition: all 0.2s ease;
            padding: var(--spacing-8) var(--spacing-12);
            letter-spacing: -0.01em;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-8);
            border-radius: var(--radius-md);
            position: relative;
        }

        .main-nav a:hover {
            background: var(--color-bg-secondary);
            color: var(--color-primary);
        }

        .main-nav a.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(139, 92, 246, 0.06));
            color: var(--color-accent);
            font-weight: 600;
        }

        .main-nav a.active::before {
            content: '';
            position: absolute;
            bottom: -1px;
            left: var(--spacing-12);
            right: var(--spacing-12);
            height: 2px;
            background: linear-gradient(90deg, var(--color-accent-gradient-start), var(--color-accent-gradient-end));
            border-radius: 2px;
        }

        /* Icons */
        .main-nav a i {
            font-size: 14px;
            transition: transform 0.2s ease, color 0.2s ease;
            color: var(--color-tertiary);
            min-width: 16px;
            display: inline-block;
            text-align: center;
        }

        .main-nav a:hover i {
            transform: translateY(-1px);
            color: var(--color-accent);
        }

        .main-nav a.active i {
            color: var(--color-accent);
        }

        /* Shop Link */
        .main-nav a.shop-link {
            background: linear-gradient(135deg, #18181B, #27272A);
            color: white !important;
            padding: var(--spacing-8) var(--spacing-20);
            border-radius: var(--radius-full);
            font-weight: 600;
            gap: var(--spacing-8);
            box-shadow: var(--shadow-sm);
            margin-left: var(--spacing-4);
        }

        .main-nav a.shop-link i {
            color: white;
            font-size: 13px;
        }

        .main-nav a.shop-link:hover {
            background: linear-gradient(135deg, #27272A, #3F3F46);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .main-nav a.shop-link:hover i {
            transform: rotate(5deg) scale(1.05);
            color: white;
        }

        .main-nav a.shop-link.active {
            background: linear-gradient(135deg, var(--color-accent-gradient-start), var(--color-accent-gradient-end));
        }

        .main-nav a.shop-link.active::before {
            display: none;
        }

        /* Mobile Toggle */
        .menu-toggle {
            display: none;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: var(--spacing-8);
            flex-direction: column;
            gap: 6px;
            border-radius: var(--radius-md);
            transition: background 0.2s;
        }

        .menu-toggle:hover {
            background: var(--color-bg-secondary);
        }

        .menu-toggle span {
            display: block;
            width: 20px;
            height: 2px;
            background: var(--color-primary);
            border-radius: 2px;
            transition: 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* Responsive */
        @media (max-width: 1024px) and (min-width: 769px) {
            .main-nav ul {
                gap: var(--spacing-4);
            }
            .main-nav a {
                font-size: 13px;
                padding: var(--spacing-6) var(--spacing-10);
            }
            .main-nav a.shop-link {
                padding: var(--spacing-6) var(--spacing-16);
            }
        }

        @media (max-width: 768px) {
            .header-inner {
                padding: var(--spacing-12) 0;
            }
            
            .logo-text, .logo-dot {
                font-size: 1.25rem;
            }
            
            .main-nav {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--color-bg);
                padding: var(--spacing-20) var(--spacing-20) var(--spacing-24);
                border-bottom: 1px solid var(--color-border);
                box-shadow: var(--shadow-xl);
                z-index: 999;
                animation: figmaFadeIn 0.25s ease-out;
            }
            
            .main-nav.active {
                display: block;
            }
            
            .main-nav ul {
                flex-direction: column;
                gap: var(--spacing-4);
                align-items: stretch;
            }
            
            .main-nav li {
                width: 100%;
            }
            
            .main-nav a {
                display: flex;
                padding: var(--spacing-12) var(--spacing-16);
                font-size: 15px;
                width: 100%;
                justify-content: flex-start;
                border-radius: var(--radius-md);
            }
            
            .main-nav a.active::before {
                display: none;
            }
            
            .main-nav a.active {
                background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.08));
                border-left: 3px solid var(--color-accent);
                border-radius: var(--radius-md);
            }
            
            .main-nav a.shop-link {
                justify-content: center;
                margin-top: var(--spacing-8);
                background: linear-gradient(135deg, var(--color-accent-gradient-start), var(--color-accent-gradient-end));
            }
            
            .menu-toggle {
                display: flex;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 0 var(--spacing-12);
            }
            
            .main-nav {
                padding: var(--spacing-16);
            }
            
            .main-nav a {
                padding: var(--spacing-10) var(--spacing-12);
                font-size: 14px;
            }
        }

        @keyframes figmaFadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .site-header.scrolled {
            box-shadow: var(--shadow-lg);
            border-bottom-color: transparent;
        }

        .main-nav a:focus-visible,
        .menu-toggle:focus-visible,
        .logo a:focus-visible {
            outline: none;
            box-shadow: 0 0 0 2px var(--color-accent-light);
            border-radius: var(--radius-md);
        }
    </style>
</head>
<body>

<header class="site-header" id="siteHeader">
    <div class="container">
        <div class="header-inner">
            <div class="logo">
                <a href="/">
                    <span class="logo-text">trendlin</span>
                    <span class="logo-dot">.</span>
                </a>
            </div>
            
            <nav class="main-nav" id="mainNav">
                <ul>
                    <li><a href="/"><i class="fas fa-th-large"></i> Home</a></li>
                    <li><a href="/categories/technology/"><i class="fas fa-microchip"></i> Technology</a></li>
                    <li><a href="/categories/health/"><i class="fas fa-heart"></i> Health</a></li>
                    <li><a href="/categories/wealth/"><i class="fas fa-chart-line"></i> Wealth</a></li>
                    <li><a href="/categories/growth/"><i class="fas fa-brain"></i> Growth</a></li>
                    <li><a href="/categories/entertainment/"><i class="fas fa-clapperboard"></i> Entertainment</a></li>
                    <li><a href="/categories/world/"><i class="fas fa-globe"></i> World</a></li>
                    <!-- LIFESTYLE - Using fa-star (solid star) which works in all Font Awesome versions -->
                    <li><a href="/categories/lifestyle/"><i class="fas fa-star"></i> Lifestyle</a></li>
                    <li><a href="/affiliate-shop/" class="shop-link"><i class="fas fa-store"></i> Shop</a></li>
                </ul>
            </nav>
            
            <button class="menu-toggle" id="menuToggle" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </div>
</header>

<script>
    (function() {
        const menuToggle = document.getElementById('menuToggle');
        const mainNav = document.getElementById('mainNav');
        const header = document.getElementById('siteHeader');
        
        // Mobile menu toggle
        if (menuToggle && mainNav) {
            menuToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                mainNav.classList.toggle('active');
                
                const spans = menuToggle.querySelectorAll('span');
                if (mainNav.classList.contains('active')) {
                    spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
                    spans[1].style.opacity = '0';
                    spans[2].style.transform = 'rotate(-45deg) translate(5px, -5px)';
                } else {
                    spans[0].style.transform = 'none';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'none';
                }
            });
            
            // Close menu when clicking a link
            const navLinks = document.querySelectorAll('.main-nav a');
            navLinks.forEach(link => {
                link.addEventListener('click', function() {
                    if (window.innerWidth <= 768 && mainNav.classList.contains('active')) {
                        mainNav.classList.remove('active');
                        const spans = menuToggle.querySelectorAll('span');
                        spans[0].style.transform = 'none';
                        spans[1].style.opacity = '1';
                        spans[2].style.transform = 'none';
                    }
                });
            });
            
            // Close menu when clicking outside
            document.addEventListener('click', function(event) {
                if (window.innerWidth <= 768 && mainNav.classList.contains('active')) {
                    const isClickInsideNav = mainNav.contains(event.target);
                    const isClickOnToggle = menuToggle.contains(event.target);
                    if (!isClickInsideNav && !isClickOnToggle) {
                        mainNav.classList.remove('active');
                        const spans = menuToggle.querySelectorAll('span');
                        spans[0].style.transform = 'none';
                        spans[1].style.opacity = '1';
                        spans[2].style.transform = 'none';
                    }
                }
            });
            
            // Handle resize
            window.addEventListener('resize', function() {
                if (window.innerWidth > 768 && mainNav.classList.contains('active')) {
                    mainNav.classList.remove('active');
                    const spans = menuToggle.querySelectorAll('span');
                    spans[0].style.transform = 'none';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'none';
                }
            });
        }
        
        // Active state detection
        const currentPath = window.location.pathname;
        const navItems = document.querySelectorAll('.main-nav a');
        
        const normalizePath = (path) => {
            if (path === '/') return '/';
            return path.replace(/\/$/, '');
        };
        
        const normalizedCurrent = normalizePath(currentPath);
        
        navItems.forEach(link => {
            const href = link.getAttribute('href');
            if (!href) return;
            let normalizedHref = normalizePath(href);
            
            link.classList.remove('active');
            
            if (normalizedCurrent === '/' && normalizedHref === '/') {
                link.classList.add('active');
            }
            else if (normalizedCurrent.includes('/categories/') && normalizedHref.includes('/categories/')) {
                const currentCategory = normalizedCurrent.split('/categories/')[1]?.replace(/\/$/, '');
                const linkCategory = normalizedHref.split('/categories/')[1]?.replace(/\/$/, '');
                if (currentCategory && linkCategory && currentCategory === linkCategory) {
                    link.classList.add('active');
                }
            }
            else if (normalizedCurrent.includes('/affiliate-shop/') && normalizedHref.includes('/affiliate-shop/')) {
                link.classList.add('active');
            }
            else if (normalizedCurrent === normalizedHref) {
                link.classList.add('active');
            }
        });
        
        // Scroll effect
        if (header) {
            window.addEventListener('scroll', function() {
                if (window.scrollY > 10) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            });
        }
        
        // Escape key to close menu
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && mainNav && mainNav.classList.contains('active')) {
                mainNav.classList.remove('active');
                const spans = menuToggle.querySelectorAll('span');
                if (spans.length) {
                    spans[0].style.transform = 'none';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'none';
                }
            }
        });
        
        console.log('✨ Trendlin navbar active — Logo matches footer trendlin style ✨');
    })();
</script>

</body>
</html>
