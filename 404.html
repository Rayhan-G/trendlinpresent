<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Trending Wealth</title>
    <meta name="description" content="The page you're looking for doesn't exist. Let's get you back on track.">
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="preload" as="style" href="/assets/css/critical.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .error-container {
            background: white;
            border-radius: 32px;
            padding: 48px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
            margin-bottom: 16px;
        }
        
        .error-icon {
            font-size: 4rem;
            margin-bottom: 24px;
        }
        
        h1 {
            font-size: 1.75rem;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        
        .error-message {
            color: #4a5568;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        .search-box {
            margin-bottom: 32px;
        }
        
        .search-box input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .search-box input:focus {
            border-color: #667eea;
        }
        
        .suggestions {
            background: #f7fafc;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 32px;
            text-align: left;
        }
        
        .suggestions h3 {
            color: #2d3748;
            margin-bottom: 16px;
            font-size: 1rem;
        }
        
        .suggestions ul {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }
        
        .suggestions li a {
            color: #667eea;
            text-decoration: none;
            display: block;
            padding: 8px 12px;
            background: white;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .suggestions li a:hover {
            background: #667eea;
            color: white;
            transform: translateX(4px);
        }
        
        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-primary, .btn-secondary {
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }
        
        .btn-secondary:hover {
            background: #cbd5e0;
        }
        
        @media (max-width: 640px) {
            .error-container {
                padding: 32px 24px;
            }
            
            .error-code {
                font-size: 5rem;
            }
            
            .suggestions ul {
                grid-template-columns: 1fr;
            }
            
            .buttons {
                flex-direction: column;
            }
            
            .btn-primary, .btn-secondary {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-icon">🔍</div>
        <h1>Page Not Found</h1>
        <div class="error-message">
            Oops! The page you're looking for doesn't exist or has been moved.<br>
            Let's help you find what you're looking for.
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search for articles, categories..." autocomplete="off">
        </div>
        
        <div class="suggestions">
            <h3>Popular pages you might be looking for:</h3>
            <ul>
                <li><a href="/">🏠 Homepage</a></li>
                <li><a href="/categories/technology/">💻 Technology</a></li>
                <li><a href="/categories/wealth/">💰 Wealth</a></li>
                <li><a href="/categories/health/">💊 Health</a></li>
                <li><a href="/categories/growth/">🌱 Growth</a></li>
                <li><a href="/contact.html">📧 Contact Us</a></li>
            </ul>
        </div>
        
        <div class="buttons">
            <a href="/" class="btn-primary">← Back to Home</a>
            <a href="/categories/" class="btn-secondary">Browse Categories →</a>
        </div>
    </div>
    
    <script>
        // Simple search redirection
        const searchInput = document.getElementById('searchInput');
        
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    window.location.href = `/search/?q=${encodeURIComponent(query)}`;
                }
            }
        });
        
        // Track 404 errors (optional)
        if (typeof gtag !== 'undefined') {
            gtag('event', '404_error', {
                'page_path': window.location.pathname,
                'page_referrer': document.referrer
            });
        }
    </script>
</body>
</html>
