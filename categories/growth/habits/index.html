<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habits | Growth | Ultima</title>
    <meta name="description" content="Build good habits, break bad ones. Evidence-based strategies for lasting behavior change.">
    <link rel="stylesheet" href="/assets/css/critical.css">
    <script src="/components/loader.js" defer></script>
    <style>
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
        .sub-header { padding: 60px 0 40px; background: linear-gradient(135deg, #0a2a1a 0%, #0a0a0a 100%); color: white; }
        .back-link { color: #34d399; text-decoration: none; margin-bottom: 24px; display: inline-block; }
        .back-link:hover { text-decoration: underline; }
        .sub-header h1 { font-size: 2.5rem; font-weight: 700; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .sub-header p { font-size: 1.125rem; color: #9ca3af; max-width: 700px; }
        .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; margin: 40px 0; }
        .post-card { border-bottom: 1px solid #eaeef2; padding-bottom: 24px; }
        .post-category { font-size: 0.75rem; text-transform: uppercase; color: #10b981; margin-bottom: 12px; }
        .post-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; }
        .post-card h3 a { color: #111827; text-decoration: none; }
        .post-card h3 a:hover { color: #10b981; }
        .post-card p { font-size: 0.875rem; color: #6b7280; line-height: 1.5; margin-bottom: 16px; }
        .post-meta { display: flex; gap: 16px; font-size: 0.75rem; color: #9ca3af; margin-top: 12px; }
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 40px; padding-top: 20px; }
        .page-link { padding: 8px 14px; border-radius: 8px; background: #f3f4f6; text-decoration: none; color: #6b7280; font-size: 0.875rem; }
        .page-link:hover { background: #e5e7eb; }
        .page-link.active { background: #111827; color: white; }
        .loading { text-align: center; padding: 60px; color: #6b7280; }
        @media (max-width: 768px) { .posts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="sub-header">
        <div class="container">
            <a href="/categories/growth/" class="back-link">← Back to Growth</a>
            <h1>🔄 Habits</h1>
            <p>Build good habits, break bad ones. Evidence-based strategies for lasting behavior change.</p>
        </div>
    </div>

    <div class="container">
        <div class="posts-section">
            <h2>Latest in Habits</h2>
            <div class="posts-grid" id="postsGrid">
                <div class="loading">Loading articles...</div>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        const CATEGORY = 'growth';
        const SUBCATEGORY = 'habits';
        let currentPage = 1;
        const POSTS_PER_PAGE = 9;
        let allPosts = [];

        async function loadContent() {
            try {
                const response = await fetch('/data/posts.json?t=' + Date.now());
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                let postsArray = Array.isArray(data) ? data : (data.posts || []);
                allPosts = postsArray.filter(post => post.category === CATEGORY && post.subcategory === SUBCATEGORY);
                if (allPosts.length === 0) {
                    document.getElementById('postsGrid').innerHTML = '<div class="loading">No articles yet. Check back soon.</div>';
                    return;
                }
                renderPosts();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('postsGrid').innerHTML = '<div class="loading">Failed to load articles. Please refresh.</div>';
            }
        }

        function renderPosts() {
            const start = (currentPage - 1) * POSTS_PER_PAGE;
            const pagePosts = allPosts.slice(start, start + POSTS_PER_PAGE);
            document.getElementById('postsGrid').innerHTML = pagePosts.map(post => `
                <div class="post-card">
                    <div class="post-category">HABITS</div>
                    <h3><a href="/posts/index.html?id=${post.id}">${escapeHtml(post.title)}</a></h3>
                    <p>${escapeHtml((post.excerpt || '').substring(0, 120))}...</p>
                    <div class="post-meta">
                        <span>📅 ${post.date || 'Recent'}</span>
                        <span>🕐 ${post.readTime || '5'} min read</span>
                        <span>👁️ ${(post.views || 0).toLocaleString()} views</span>
                    </div>
                </div>
            `).join('');
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(allPosts.length / POSTS_PER_PAGE);
            if (totalPages <= 1) return;
            let html = '';
            if (currentPage > 1) html += `<a href="#" class="page-link" data-page="${currentPage-1}">← Prev</a>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage-2 && i <= currentPage+2)) {
                    html += `<a href="#" class="page-link ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</a>`;
                } else if (i === currentPage-3 || i === currentPage+3) {
                    html += `<span class="page-link">...</span>`;
                }
            }
            if (currentPage < totalPages) html += `<a href="#" class="page-link" data-page="${currentPage+1}">Next →</a>`;
            document.getElementById('pagination').innerHTML = html;
            document.querySelectorAll('.page-link[data-page]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    currentPage = parseInt(link.dataset.page);
                    renderPosts();
                    window.scrollTo({ top: 300, behavior: 'smooth' });
                });
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        loadContent();
    </script>
</body>
</html>
