<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Entertainment | Trendlin — Intelligence for the Modern World</title>
    <meta name="description" content="What's worth your time. Curated recommendations on film, TV, music, gaming, arts, pop culture, digital content, and sports entertainment — researched and explained.">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary-500: #0F6EFF;
            --gray-900: #1E1E2F;
            --gray-700: #4A4A5A;
            --gray-600: #6E6E80;
            --gray-200: #EDEDF2;
            --gray-100: #F5F5F8;
            --white: #FFFFFF;
            --bg-app: var(--gray-100);
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-600);
            --space-6: 24px;
            --space-12: 48px;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-app);
            color: var(--text-primary);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 var(--space-6);
        }

        #header-placeholder, #footer-placeholder {
            width: 100%;
        }

        /* Entertainment Hero */
        .hero {
            padding: 60px 0 50px;
            background: linear-gradient(135deg, #1a0a2a 0%, #0a0a0a 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.3), transparent);
            top: -100px;
            right: -100px;
            border-radius: 50%;
            animation: floatOrb 15s infinite alternate;
        }

        .hero::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.2), transparent);
            bottom: -150px;
            left: -150px;
            border-radius: 50%;
            animation: floatOrb2 18s infinite alternate;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(-50px, 50px) scale(1.3); opacity: 0.6; }
        }

        @keyframes floatOrb2 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
            100% { transform: translate(60px, -40px) scale(1.4); opacity: 0.5; }
        }

        .hero-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(139, 92, 246, 0.08) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(139, 92, 246, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(139, 92, 246, 0.2);
            backdrop-filter: blur(10px);
            color: #a78bfa;
            padding: 6px 20px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 24px;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .hero h1 {
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            color: white;
            letter-spacing: -0.03em;
        }

        .hero h1 span {
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero p {
            font-size: 1rem;
            color: #9ca3af;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .feed-section {
            padding: var(--space-12) 0;
            background: var(--bg-app);
        }

        /* ========== IMPROVED SUBCATEGORY CARD DESIGN ========== */
        .subcategory-showcase {
            padding: 80px 0;
            background: linear-gradient(135deg, #f9fafb 0%, #ffffff 100%);
        }
        .subcategory-showcase .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .showcase-header {
            text-align: center;
            margin-bottom: 56px;
        }
        .showcase-header .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #8B5CF6;
            margin-bottom: 16px;
            font-weight: 600;
        }
        .showcase-header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 16px;
        }
        .showcase-header p {
            color: #6b7280;
            font-size: 0.95rem;
        }
        .subcategory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
        }
        
        /* IMPROVED CARD STYLES - Premium, Modern, Interactive */
        .subcategory-card {
            background: white;
            border-radius: 28px;
            padding: 32px 28px;
            text-decoration: none;
            display: block;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03), 0 2px 4px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(139, 92, 246, 0.12);
        }
        
        /* Animated gradient border on hover */
        .subcategory-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            padding: 2px;
            background: linear-gradient(135deg, #8B5CF6, #EC4899, #8B5CF6);
            background-size: 200% 200%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        
        .subcategory-card:hover::before {
            opacity: 1;
            animation: borderFlow 3s ease infinite;
        }
        
        @keyframes borderFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Subtle inner glow on hover */
        .subcategory-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: radial-gradient(ellipse at 30% 0%, rgba(139, 92, 246, 0.08), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        
        .subcategory-card:hover::after {
            opacity: 1;
        }
        
        .subcategory-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 28px 40px -16px rgba(0, 0, 0, 0.18);
            border-color: rgba(139, 92, 246, 0.3);
        }
        
        /* Card Icon - with scaling effect */
        .card-icon {
            font-size: 3.2rem;
            margin-bottom: 24px;
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.05));
        }
        
        .subcategory-card:hover .card-icon {
            transform: scale(1.08) translateY(-2px);
        }
        
        /* Card Title - with gradient option */
        .card-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* Dark mode title adjustment */
        @media (prefers-color-scheme: dark) {
            .card-title {
                background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
            }
        }
        
        /* Card Tagline - with gradient and badge style */
        .card-tagline {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #8B5CF6, #D946EF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 14px;
            display: inline-block;
        }
        
        /* Card Description - improved readability */
        .card-description {
            font-size: 0.9rem;
            color: #6b7280;
            line-height: 1.55;
            margin-bottom: 28px;
            font-weight: 450;
        }
        
        /* Explore Link - modern button style */
        .explore-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4B5563;
            background: #F9FAFB;
            padding: 8px 18px;
            border-radius: 40px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            letter-spacing: 0.2px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        .subcategory-card:hover .explore-link {
            gap: 14px;
            background: #8B5CF6;
            color: white;
            border-color: #8B5CF6;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }
        
        .explore-link span {
            transition: transform 0.25s ease;
            font-size: 1rem;
        }
        
        .subcategory-card:hover .explore-link span {
            transform: translateX(6px);
        }
        
        /* Dark Mode Enhancements */
        @media (prefers-color-scheme: dark) {
            .subcategory-showcase {
                background: #0f0f16;
            }
            .subcategory-card {
                background: #181822;
                border-color: rgba(139, 92, 246, 0.2);
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            }
            .card-description {
                color: #a1a1aa;
            }
            .explore-link {
                background: #252530;
                color: #c7c7d0;
                border-color: rgba(139, 92, 246, 0.3);
            }
            .showcase-header h2 {
                color: #f0f0ff;
            }
            .showcase-header p {
                color: #a1a1aa;
            }
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .subcategory-card {
                padding: 26px 22px;
            }
            .card-icon {
                font-size: 2.6rem;
                margin-bottom: 18px;
            }
            .card-title {
                font-size: 1.4rem;
            }
            .card-tagline {
                font-size: 0.7rem;
            }
            .explore-link {
                padding: 6px 16px;
                font-size: 0.8rem;
            }
            .subcategory-grid {
                gap: 24px;
            }
        }
        
        /* Loading state */
        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div id="header-placeholder"></div>

<!-- Entertainment Hero -->
<section class="hero">
    <div class="hero-grid"></div>
    <div class="container">
        <div class="hero-content">
            <div class="hero-badge">TRENDLIN ENTERTAINMENT</div>
            <h1>What's <span>worth your time</span></h1>
            <p>Trends in movies, TV, music, gaming, arts, pop culture, digital content, and sports entertainment — researched and explained.</p>
        </div>
    </div>
</section>

<!-- Live Feed -->
<section class="feed-section">
    <div class="container">
        <div id="live-feed-root"></div>
    </div>
</section>

<!-- SUBCATEGORY SECTION - CARDS PROPERLY LINKED TO SUBPAGES -->
<div class="subcategory-showcase">
    <div class="container">
        <div class="showcase-header">
            <div class="section-label">Explore Topics</div>
            <h2>Find your next obsession</h2>
            <p>Dive into your favorite entertainment categories</p>
        </div>
        <div class="subcategory-grid" id="subcategory-grid">
            <div class="loading">Loading categories...</div>
        </div>
    </div>
</div>

<div id="footer-placeholder"></div>

<script>
    // Load header and footer
    function loadComponent(elementId, filePath) {
        fetch(filePath)
            .then(response => response.ok ? response.text() : Promise.reject())
            .then(html => {
                document.getElementById(elementId).innerHTML = html;
            })
            .catch(() => {
                document.getElementById(elementId).innerHTML = `<div style="text-align:center;padding:20px;">Failed to load</div>`;
            });
    }

    loadComponent('header-placeholder', '/components/header.html');
    loadComponent('footer-placeholder', '/components/footer.html');

    // Load and modify the live feed component - FORCE ENTERTAINMENT ONLY
    const liveFeedContainer = document.getElementById('live-feed-root');
    if (liveFeedContainer) {
        fetch('/components/live-feed-component.html')
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.text();
            })
            .then(html => {
                let modifiedHtml = html.replace(
                    "const JSON_PATH = 'live-feed/data/posts.json';",
                    "const JSON_PATH = '/live-feed/data/posts.json';"
                );
                
                modifiedHtml = modifiedHtml.replace(
                    "'use strict';",
                    `'use strict';\n        const FORCED_CATEGORY = 'entertainment';\n        const originalFilterByCategory = filterByCategory;\n        window.filterByCategory = function(category) {\n            if (category !== FORCED_CATEGORY) return;\n            originalFilterByCategory(FORCED_CATEGORY);\n        };\n        document.addEventListener('DOMContentLoaded', function() {\n            const filterBar = document.querySelector('.category-filter');\n            if (filterBar) filterBar.style.display = 'none';\n        });`
                );
                
                modifiedHtml = modifiedHtml.replace(
                    "allPosts = data.posts;",
                    `allPosts = data.posts;\n                allPosts = allPosts.filter(p => p.category?.toLowerCase() === FORCED_CATEGORY);\n                console.log(\`🎬 Entertainment only: \${allPosts.length} posts\`);`
                );
                
                modifiedHtml = modifiedHtml.replace(
                    "filterByCategory('all');",
                    "filterByCategory(FORCED_CATEGORY);"
                );
                
                liveFeedContainer.innerHTML = modifiedHtml;
                
                const scripts = liveFeedContainer.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }
                    document.body.appendChild(newScript);
                });
                
                setTimeout(() => {
                    const observer = new MutationObserver(function() {
                        const countSpan = document.getElementById('livePostCount');
                        if (countSpan && countSpan.textContent !== '0') {
                            const postCountEl = document.getElementById('postCount');
                            if (postCountEl) postCountEl.textContent = countSpan.textContent;
                        }
                    });
                    observer.observe(document.body, { childList: true, subtree: true });
                }, 500);
            })
            .catch(error => {
                console.error('Failed to load component:', error);
                liveFeedContainer.innerHTML = `<div style="text-align:center; padding:60px;">Failed to load feed</div>`;
            });
    }

    // Subcategories data with PROPER LINKS to the subcategory pages
    const ENTERTAINMENT_SUBCATEGORIES = [
        { 
            name: 'Movies & TV', 
            icon: '🎬', 
            tagline: 'Cinema & streaming magic', 
            description: 'Hollywood, Bollywood, TV series, documentaries, and short films — everything worth watching on the big and small screen.',
            link: '/categories/entertainment/movies-tv/'
        },
        { 
            name: 'Music', 
            icon: '🎵', 
            tagline: 'Songs that move you', 
            description: 'Albums, music videos, live concerts, and deep dives into pop, rock, hip-hop, classical, and everything in between.',
            link: '/categories/entertainment/music/'
        },
        { 
            name: 'Gaming', 
            icon: '🎮', 
            tagline: 'Level up', 
            description: 'Video games, esports, game streaming, reviews, and walkthroughs for PC, console, and mobile gamers.',
            link: '/categories/entertainment/gaming/'
        },
        { 
            name: 'Arts & Performance', 
            icon: '🎭', 
            tagline: 'Live & on stage', 
            description: 'Theatre, drama, dance, stand-up comedy, circus, and live shows that celebrate creative expression.',
            link: '/categories/entertainment/arts-performance/'
        },
        { 
            name: 'Celebrity & Pop Culture', 
            icon: '📚', 
            tagline: 'What everyone\'s talking about', 
            description: 'Celebrity news, gossip, interviews, awards shows, and the cultural moments that define our time.',
            link: '/categories/entertainment/celebrity-pop-culture/'
        },
        { 
            name: 'Digital & Online', 
            icon: '📺', 
            tagline: 'Born on the internet', 
            description: 'YouTube, TikTok, podcasts, livestreaming, memes, and viral content — the digital entertainment revolution.',
            link: '/categories/entertainment/digital-online/'
        },
        { 
            name: 'Sports Entertainment', 
            icon: '🏟️', 
            tagline: 'Where passion meets play', 
            description: 'Match highlights, player spotlights, and sports events as entertainment — from World Cup to WrestleMania.',
            link: '/categories/entertainment/sports-entertainment/'
        },
        { 
            name: 'Creative Entertainment', 
            icon: '🎨', 
            tagline: 'Imagination unleashed', 
            description: 'Animation, comics, manga, fan fiction, and storytelling content that pushes creative boundaries.',
            link: '/categories/entertainment/creative-entertainment/'
        }
    ];

    // Render function with proper href links
    async function renderSubcategoryGrid() {
        const grid = document.getElementById('subcategory-grid');
        if (!grid) return;
        
        const cards = [];
        for (const cat of ENTERTAINMENT_SUBCATEGORIES) {
            cards.push(`
                <a href="${cat.link}" class="subcategory-card">
                    <div class="card-icon">${cat.icon}</div>
                    <h3 class="card-title">${cat.name}</h3>
                    <div class="card-tagline">${cat.tagline}</div>
                    <p class="card-description">${cat.description}</p>
                    <div class="explore-link">Explore <span>→</span></div>
                </a>
            `);
        }
        grid.innerHTML = cards.join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderSubcategoryGrid();
    });
</script>

</body>
</html>
