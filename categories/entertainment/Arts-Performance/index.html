<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Arts & Performance | Entertainment | Trendlin</title>
    <meta name="description" content="Theatre, drama, dance, stand-up comedy, circus, and live shows that celebrate creative expression.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :focus { outline: none; }
        :focus-visible { outline: 2px solid #8b5cf6; outline-offset: 2px; border-radius: 4px; }
        a, .back-link, .page-link { cursor: pointer; touch-action: manipulation; transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1); -webkit-tap-highlight-color: transparent; }
        a:active, .back-link:active, .page-link:active { transform: scale(0.96); opacity: 0.85; transition-duration: 0.05s; }
        @media (hover: hover) { .back-link:hover { text-decoration: underline; } .post-card h3 a:hover { color: #8b5cf6; } .page-link:hover:not(.active) { background: #e5e7eb; transform: translateY(-1px); } }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #ffffff; color: #111827; line-height: 1.5; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
        .sub-header { padding: 60px 0 40px; background: linear-gradient(135deg, #1a0a2a 0%, #0a0a0a 100%); color: white; position: relative; overflow: hidden; }
        .sub-header::before { content: ''; position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(139, 92, 246, 0.25), transparent); top: -80px; right: -80px; border-radius: 50%; animation: floatOrb 18s infinite alternate; pointer-events: none; }
        .sub-header::after { content: ''; position: absolute; width: 250px; height: 250px; background: radial-gradient(circle, rgba(236, 72, 153, 0.15), transparent); bottom: -60px; left: -60px; border-radius: 50%; animation: floatOrb2 20s infinite alternate; pointer-events: none; }
        @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); opacity: 0.3; } 100% { transform: translate(-40px, 40px) scale(1.2); opacity: 0.6; } }
        @keyframes floatOrb2 { 0% { transform: translate(0, 0) scale(1); opacity: 0.2; } 100% { transform: translate(50px, -30px) scale(1.3); opacity: 0.5; } }
        .back-link { color: #a78bfa; text-decoration: none; margin-bottom: 24px; display: inline-block; position: relative; z-index: 2; font-size: 0.9rem; }
        .sub-header h1 { font-size: 2.5rem; font-weight: 700; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; position: relative; z-index: 2; }
        .sub-header p { font-size: 1rem; color: #9ca3af; max-width: 700px; position: relative; z-index: 2; }
        .posts-section { margin: 40px 0; }
        .posts-section h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; color: #111827; }
        .posts-grid { display: grid; grid-template-columns: 1fr; gap: 32px; }
        @media (min-width: 640px) { .posts-grid { grid-template-columns: repeat(2, 1fr); gap: 28px; } }
        @media (min-width: 1024px) { .posts-grid { grid-template-columns: repeat(3, 1fr); gap: 32px; } .sub-header h1 { font-size: 3rem; } }
        .post-card { border-bottom: 1px solid #eaeef2; padding-bottom: 24px; transition: all 0.3s ease; }
        .post-card:active { transform: scale(0.98); transition-duration: 0.05s; }
        @media (hover: hover) { .post-card:hover { transform: translateY(-2px); } }
        .post-category { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #8b5cf6; margin-bottom: 12px; font-weight: 600; }
        .post-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; line-height: 1.4; }
        .post-card h3 a { color: #111827; text-decoration: none; transition: color 0.2s ease; display: inline-block; }
        .post-card p { font-size: 0.85rem; color: #6b7280; margin-bottom: 16px; line-height: 1.5; }
        .post-meta { display: flex; gap: 16px; font-size: 0.7rem; color: #9ca3af; margin-top: 12px; flex-wrap: wrap; }
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 48px; padding-top: 20px; flex-wrap: wrap; }
        .page-link { padding: 8px 14px; border-radius: 8px; background: #f3f4f6; text-decoration: none; color: #6b7280; transition: all 0.2s ease; display: inline-flex; align-items: center; justify-content: center; min-width: 40px; }
        .page-link.active { background: #111827; color: white; }
        .loading { text-align: center; padding: 60px; color: #6b7280; font-size: 0.9rem; }
        .error { text-align: center; padding: 60px; color: #ef4444; }
        @media (prefers-color-scheme: dark) { body { background: #0f0f13; color: #e4e4e7; } .posts-section h2 { color: #e4e4e7; } .post-card { border-bottom-color: #1f1f2a; } .post-card h3 a { color: #e4e4e7; } .post-card p { color: #9ca3af; } .page-link { background: #1f1f2a; color: #9ca3af; } .page-link.active { background: #8b5cf6; color: white; } }
        @media (max-width: 640px) { .sub-header { padding: 40px 0 32px; } .sub-header h1 { font-size: 1.8rem; } .posts-section { margin: 32px 0; } .page-link { padding: 6px 12px; min-width: 36px; font-size: 0.8rem; } }
        @keyframes skeletonPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .skeleton-card { border-bottom: 1px solid #eaeef2; padding-bottom: 24px; }
        .skeleton-category { width: 80px; height: 14px; background: #e5e7eb; border-radius: 4px; margin-bottom: 12px; animation: skeletonPulse 1.5s ease-in-out infinite; }
        .skeleton-title { width: 90%; height: 20px; background: #e5e7eb; border-radius: 4px; margin-bottom: 12px; animation: skeletonPulse 1.5s ease-in-out infinite; }
        .skeleton-excerpt { width: 100%; height: 60px; background: #e5e7eb; border-radius: 4px; margin-bottom: 16px; animation: skeletonPulse 1.5s ease-in-out infinite; }
        .skeleton-meta { width: 60%; height: 14px; background: #e5e7eb; border-radius: 4px; animation: skeletonPulse 1.5s ease-in-out infinite; }
        @media (prefers-color-scheme: dark) { .skeleton-category, .skeleton-title, .skeleton-excerpt, .skeleton-meta { background: #1f1f2a; } }
    </style>
</head>
<body>
    <div class="sub-header">
        <div class="container">
            <a href="/categories/entertainment/" class="back-link">← Back to Entertainment</a>
            <h1>🎭 Arts & Performance</h1>
            <p>Theatre, drama, dance, stand-up comedy, circus, and live shows that celebrate creative expression.</p>
        </div>
    </div>
    <div class="container">
        <div class="posts-section">
            <h2>Latest in Arts & Performance</h2>
            <div class="posts-grid" id="postsGrid"><div class="skeleton-card"><div class="skeleton-category"></div><div class="skeleton-title"></div><div class="skeleton-excerpt"></div><div class="skeleton-meta"></div></div><div class="skeleton-card"><div class="skeleton-category"></div><div class="skeleton-title"></div><div class="skeleton-excerpt"></div><div class="skeleton-meta"></div></div><div class="skeleton-card"><div class="skeleton-category"></div><div class="skeleton-title"></div><div class="skeleton-excerpt"></div><div class="skeleton-meta"></div></div></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
    <script>
        const CATEGORY = 'entertainment';
        const SUBCATEGORY = 'arts-performance';
        let currentPage = 1;
        const POSTS_PER_PAGE = 9;
        let allPosts = [];
        async function loadContent() {
            try {
                const response = await fetch('/data/posts.json?t=' + Date.now());
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                let postsArray = Array.isArray(data) ? data : (data.posts || []);
                allPosts = postsArray.filter(post => post.category === CATEGORY && post.subcategory === SUBCATEGORY);
                if (allPosts.length === 0) { document.getElementById('postsGrid').innerHTML = '<div class="loading">🎭 No arts & performance articles yet. Check back soon for theatre reviews and comedy highlights!</div>'; return; }
                renderPosts();
            } catch (error) { document.getElementById('postsGrid').innerHTML = '<div class="error">⚠️ Failed to load posts. Please refresh or try again later.</div>'; }
        }
        function formatDate(dateString) { if (!dateString) return 'Recent'; try { const date = new Date(dateString); if (isNaN(date.getTime())) return 'Recent'; return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); } catch { return 'Recent'; } }
        function escapeHtml(str) { if (!str) return ''; return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
        function renderPosts() {
            const start = (currentPage - 1) * POSTS_PER_PAGE;
            const pagePosts = allPosts.slice(start, start + POSTS_PER_PAGE);
            const postsGrid = document.getElementById('postsGrid');
            if (!postsGrid) return;
            if (pagePosts.length === 0) { postsGrid.innerHTML = '<div class="loading">No posts on this page.</div>'; return; }
            postsGrid.innerHTML = pagePosts.map(post => {
                const excerpt = post.excerpt || post.content?.replace(/<[^>]*>/g, '').substring(0, 120) || 'Theatre reviews, dance performances, stand-up comedy specials, and live show highlights.';
                const trimmedExcerpt = excerpt.length > 120 ? excerpt.substring(0, 117) + '...' : excerpt;
                const postDate = formatDate(post.date);
                const readTime = post.readTime || (post.content ? Math.ceil(post.content.length / 1000) : 5);
                const views = post.views || Math.floor(Math.random() * 15000) + 1000;
                return `<div class="post-card"><div class="post-category">${(post.subcategory || 'ARTS & PERFORMANCE').toUpperCase()}</div><h3><a href="/posts/index.html?id=${post.id}">${escapeHtml(post.title)}</a></h3><p>${escapeHtml(trimmedExcerpt)}</p><div class="post-meta"><span>📅 ${postDate}</span><span>🕐 ${readTime} min read</span><span>👁️ ${views.toLocaleString()} views</span></div></div>`;
            }).join('');
            renderPagination();
        }
        function renderPagination() {
            const totalPages = Math.ceil(allPosts.length / POSTS_PER_PAGE);
            if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
            let html = '';
            if (currentPage > 1) html += `<a href="#" class="page-link" data-page="${currentPage-1}">← Prev</a>`;
            for (let i = 1; i <= totalPages; i++) { if (i === 1 || i === totalPages || (i >= currentPage-2 && i <= currentPage+2)) { html += `<a href="#" class="page-link ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</a>`; } else if (i === currentPage-3 || i === currentPage+3) { html += `<span class="page-link" style="background: transparent; cursor: default;">...</span>`; } }
            if (currentPage < totalPages) html += `<a href="#" class="page-link" data-page="${currentPage+1}">Next →</a>`;
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = html;
            document.querySelectorAll('.page-link[data-page]').forEach(link => { link.addEventListener('click', (e) => { e.preventDefault(); const targetPage = parseInt(link.dataset.page); if (!isNaN(targetPage) && targetPage !== currentPage) { currentPage = targetPage; renderPosts(); document.querySelector('.posts-section')?.scrollIntoView({ behavior: 'smooth', block: 'start' }); } }); });
        }
        document.addEventListener('DOMContentLoaded', loadContent);
    </script>
</body>
</html>
