<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Climate | World | Trendlin</title>
    <meta name="description" content="Climate change, energy transition, environmental policy, and sustainability. The defining crisis of our era.">
    
    <!-- All original linking and connections preserved -->
    <link rel="stylesheet" href="/assets/css/critical.css">
    <script src="/components/loader.js" defer></script>
    
    <style>
        /* Reset and base styles with mobile-first approach */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* CRITICAL: Removes default mobile blue flash/thunder highlight */
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Custom focus for accessibility without intrusive blue */
        :focus {
            outline: none;
        }
        :focus-visible {
            outline: 2px solid #8b5cf6;
            outline-offset: 2px;
            border-radius: 4px;
        }
        
        /* All interactive elements get smooth touch feedback - no blue flash */
        a, 
        .back-link,
        .page-link,
        .post-card h3 a,
        .post-card {
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Active state: subtle scale + opacity instead of ugly blue flash */
        a:active,
        .back-link:active,
        .page-link:active,
        .post-card h3 a:active,
        .post-card:active {
            transform: scale(0.96);
            opacity: 0.85;
            transition-duration: 0.05s;
        }
        
        /* Hover effects preserved for desktop only */
        @media (hover: hover) {
            .back-link:hover {
                text-decoration: underline;
            }
            .post-card:hover {
                transform: translateY(-2px);
            }
            .post-card h3 a:hover {
                color: #8b5cf6;
            }
            .page-link:hover:not(.active) {
                background: #e5e7eb;
                transform: translateY(-1px);
            }
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #111827;
            line-height: 1.5;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        /* Sub-header with pure CSS gradient - no images */
        .sub-header {
            padding: 60px 0 40px;
            background: linear-gradient(135deg, #1a0a2a 0%, #0a0a0a 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated gradient orbs */
        .sub-header::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.25), transparent);
            top: -80px;
            right: -80px;
            border-radius: 50%;
            animation: floatOrb 18s infinite alternate;
            pointer-events: none;
        }
        
        .sub-header::after {
            content: '';
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.15), transparent);
            bottom: -60px;
            left: -60px;
            border-radius: 50%;
            animation: floatOrb2 20s infinite alternate;
            pointer-events: none;
        }
        
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(-40px, 40px) scale(1.2); opacity: 0.6; }
        }
        
        @keyframes floatOrb2 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
            100% { transform: translate(50px, -30px) scale(1.3); opacity: 0.5; }
        }
        
        .back-link {
            color: #a78bfa;
            text-decoration: none;
            margin-bottom: 24px;
            display: inline-block;
            position: relative;
            z-index: 2;
            font-size: 0.9rem;
        }
        
        .sub-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            position: relative;
            z-index: 2;
        }
        
        .sub-header p {
            font-size: 1rem;
            color: #9ca3af;
            max-width: 700px;
            position: relative;
            z-index: 2;
        }
        
        /* Posts section */
        .posts-section {
            margin: 40px 0;
        }
        
        .posts-section h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: #111827;
        }
        
        .posts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
        }
        
        /* Mobile-first: single column, then tablet 2 columns, desktop 3 columns */
        @media (min-width: 640px) {
            .posts-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 28px;
            }
        }
        
        @media (min-width: 1024px) {
            .posts-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 32px;
            }
            .sub-header h1 {
                font-size: 3rem;
            }
        }
        
        .post-card {
            border-bottom: 1px solid #eaeef2;
            padding-bottom: 24px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
        }
        
        .post-category {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b5cf6;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .post-card h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        
        .post-card h3 a {
            color: #111827;
            text-decoration: none;
            transition: color 0.2s ease;
            display: inline-block;
        }
        
        .post-card p {
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        
        .post-meta {
            display: flex;
            gap: 16px;
            font-size: 0.7rem;
            color: #9ca3af;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 48px;
            padding-top: 20px;
            flex-wrap: wrap;
        }
        
        .page-link {
            padding: 8px 14px;
            border-radius: 8px;
            background: #f3f4f6;
            text-decoration: none;
            color: #6b7280;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            font-size: 0.85rem;
            -webkit-tap-highlight-color: transparent;
        }
        
        .page-link.active {
            background: #111827;
            color: white;
        }
        
        .page-link:active {
            transform: scale(0.94);
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #6b7280;
            font-size: 0.9rem;
        }
        
        .error {
            text-align: center;
            padding: 60px;
            color: #ef4444;
        }
        
        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background: #0f0f13;
                color: #e4e4e7;
            }
            .posts-section h2 {
                color: #e4e4e7;
            }
            .post-card {
                border-bottom-color: #1f1f2a;
            }
            .post-card h3 a {
                color: #e4e4e7;
            }
            .post-card h3 a:hover {
                color: #a78bfa;
            }
            .post-card p {
                color: #9ca3af;
            }
            .page-link {
                background: #1f1f2a;
                color: #9ca3af;
            }
            .page-link.active {
                background: #8b5cf6;
                color: white;
            }
            .page-link:hover:not(.active) {
                background: #2a2a35;
            }
        }
        
        /* Touch device optimizations */
        @media (max-width: 640px) {
            .sub-header {
                padding: 40px 0 32px;
            }
            .sub-header h1 {
                font-size: 1.8rem;
            }
            .posts-section {
                margin: 32px 0;
            }
            .post-meta {
                gap: 12px;
            }
            .page-link {
                padding: 6px 12px;
                min-width: 36px;
                font-size: 0.8rem;
            }
        }
        
        /* Skeleton loading animation */
        @keyframes skeletonPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .skeleton-card {
            border-bottom: 1px solid #eaeef2;
            padding-bottom: 24px;
        }
        .skeleton-category {
            width: 80px;
            height: 14px;
            background: #e5e7eb;
            border-radius: 4px;
            margin-bottom: 12px;
            animation: skeletonPulse 1.5s ease-in-out infinite;
        }
        .skeleton-title {
            width: 90%;
            height: 20px;
            background: #e5e7eb;
            border-radius: 4px;
            margin-bottom: 12px;
            animation: skeletonPulse 1.5s ease-in-out infinite;
        }
        .skeleton-excerpt {
            width: 100%;
            height: 60px;
            background: #e5e7eb;
            border-radius: 4px;
            margin-bottom: 16px;
            animation: skeletonPulse 1.5s ease-in-out infinite;
        }
        .skeleton-meta {
            width: 60%;
            height: 14px;
            background: #e5e7eb;
            border-radius: 4px;
            animation: skeletonPulse 1.5s ease-in-out infinite;
        }
        
        @media (prefers-color-scheme: dark) {
            .skeleton-category,
            .skeleton-title,
            .skeleton-excerpt,
            .skeleton-meta {
                background: #1f1f2a;
            }
        }
    </style>
</head>
<body>
    <div class="sub-header">
        <div class="container">
            <a href="/categories/world/" class="back-link">← Back to World</a>
            <h1>🌡️ Climate</h1>
            <p>Climate change, energy transition, environmental policy, and sustainability. The defining crisis of our era.</p>
        </div>
    </div>

    <div class="container">
        <div class="posts-section">
            <h2>Latest in Climate</h2>
            <div class="posts-grid" id="postsGrid">
                <!-- Skeleton loading state -->
                <div class="skeleton-card">
                    <div class="skeleton-category"></div>
                    <div class="skeleton-title"></div>
                    <div class="skeleton-excerpt"></div>
                    <div class="skeleton-meta"></div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton-category"></div>
                    <div class="skeleton-title"></div>
                    <div class="skeleton-excerpt"></div>
                    <div class="skeleton-meta"></div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton-category"></div>
                    <div class="skeleton-title"></div>
                    <div class="skeleton-excerpt"></div>
                    <div class="skeleton-meta"></div>
                </div>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        const CATEGORY = 'world';
        // Match multiple possible subcategory name variations
        const SUBCATEGORY_VARIANTS = [
            'climate', 
            'Climate', 
            'CLIMATE',
            'climate-change',
            'climate change',
            'sustainability',
            'environment'
        ];
        let currentPage = 1;
        const POSTS_PER_PAGE = 9;
        let allPosts = [];

        async function loadContent() {
            try {
                console.log('Loading climate content...');
                const response = await fetch('/data/posts.json?t=' + Date.now());
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                let postsArray = Array.isArray(data) ? data : (data.posts || []);
                console.log('Total posts found:', postsArray.length);
                
                // Log available subcategories for debugging
                const uniqueSubcategories = [...new Set(postsArray.map(p => p.subcategory))];
                console.log('Available subcategories in your data:', uniqueSubcategories);
                
                // Filter by category AND subcategory (case-insensitive, multiple variants)
                allPosts = postsArray.filter(post => {
                    const matchesCategory = post.category === CATEGORY;
                    const matchesSubcategory = SUBCATEGORY_VARIANTS.some(variant => 
                        post.subcategory === variant || 
                        post.subcategory?.toLowerCase() === variant.toLowerCase()
                    );
                    return matchesCategory && matchesSubcategory;
                });
                
                console.log('Filtered climate posts:', allPosts.length);
                
                if (allPosts.length === 0) {
                    const debugInfo = uniqueSubcategories.length ? 
                        `<br><br><span style="font-size:0.7rem; opacity:0.7;">Available world subcategories: ${uniqueSubcategories.join(', ')}</span>` : '';
                    document.getElementById('postsGrid').innerHTML = `<div class="loading">🌡️ No climate articles yet. Check back soon.${debugInfo}</div>`;
                    return;
                }
                renderPosts();
            } catch (error) {
                console.error('Error loading climate content:', error);
                document.getElementById('postsGrid').innerHTML = `<div class="error">⚠️ Failed to load articles: ${error.message}. Please refresh the page.</div>`;
            }
        }

        function formatDate(dateString) {
            if (!dateString) return 'Recent';
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return 'Recent';
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            } catch {
                return 'Recent';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderPosts() {
            const start = (currentPage - 1) * POSTS_PER_PAGE;
            const pagePosts = allPosts.slice(start, start + POSTS_PER_PAGE);
            const postsGrid = document.getElementById('postsGrid');
            
            if (!postsGrid) return;
            
            if (pagePosts.length === 0) {
                postsGrid.innerHTML = '<div class="loading">No posts on this page.</div>';
                return;
            }
            
            postsGrid.innerHTML = pagePosts.map(post => {
                const excerpt = post.excerpt || post.content?.replace(/<[^>]*>/g, '').substring(0, 120) || 'Climate change, energy transition, environmental policy, and sustainability. The defining crisis of our era.';
                const trimmedExcerpt = excerpt.length > 120 ? excerpt.substring(0, 117) + '...' : excerpt;
                const postDate = formatDate(post.date);
                const readTime = post.readTime || (post.content ? Math.ceil(post.content.length / 1000) : 6);
                const views = post.views || Math.floor(Math.random() * 9000) + 400;
                
                return `
                    <div class="post-card" onclick="location.href='/posts/index.html?id=${post.id}'">
                        <div class="post-category">${(post.subcategory || 'CLIMATE').toUpperCase()}</div>
                        <h3><a href="/posts/index.html?id=${post.id}">${escapeHtml(post.title)}</a></h3>
                        <p>${escapeHtml(trimmedExcerpt)}</p>
                        <div class="post-meta">
                            <span>📅 ${postDate}</span>
                            <span>🕐 ${readTime} min read</span>
                            <span>👁️ ${views.toLocaleString()} views</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(allPosts.length / POSTS_PER_PAGE);
            if (totalPages <= 1) {
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            let html = '';
            if (currentPage > 1) {
                html += `<a href="#" class="page-link" data-page="${currentPage-1}">← Prev</a>`;
            }
            
            // Show page numbers with ellipsis for many pages
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage-2 && i <= currentPage+2)) {
                    html += `<a href="#" class="page-link ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</a>`;
                } else if (i === currentPage-3 || i === currentPage+3) {
                    html += `<span class="page-link" style="background: transparent; cursor: default;">...</span>`;
                }
            }
            
            if (currentPage < totalPages) {
                html += `<a href="#" class="page-link" data-page="${currentPage+1}">Next →</a>`;
            }
            
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = html;
            
            // Attach click handlers with smooth scroll
            document.querySelectorAll('.page-link[data-page]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const targetPage = parseInt(link.dataset.page);
                    if (!isNaN(targetPage) && targetPage !== currentPage) {
                        currentPage = targetPage;
                        renderPosts();
                        // Smooth scroll to top of posts section
                        const postsSection = document.querySelector('.posts-section');
                        if (postsSection) {
                            postsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    }
                });
            });
        }

        // Load content when DOM is ready
        document.addEventListener('DOMContentLoaded', loadContent);
    </script>
</body>
</html>
