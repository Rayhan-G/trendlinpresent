<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Global Health | World | Trendlin</title>
    <meta name="description" content="Pandemic preparedness, healthcare systems, disease eradication, and health equity worldwide. Latest insights on global health challenges.">
    
    <!-- Google Fonts for cleaner typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <style>
        /* Reset and base styles with mobile-first approach */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* CRITICAL: Removes default mobile blue flash/thunder highlight */
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Custom focus for accessibility without intrusive blue */
        :focus {
            outline: none;
        }
        :focus-visible {
            outline: 2px solid #10b981;
            outline-offset: 2px;
            border-radius: 4px;
        }
        
        /* All interactive elements get smooth touch feedback - no blue flash */
        a, 
        .back-link,
        .page-link,
        .post-card h3 a,
        .post-card {
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Active state: subtle scale + opacity instead of ugly blue flash */
        a:active,
        .back-link:active,
        .page-link:active,
        .post-card h3 a:active,
        .post-card:active {
            transform: scale(0.96);
            opacity: 0.85;
            transition-duration: 0.05s;
        }
        
        /* Hover effects preserved for desktop only */
        @media (hover: hover) {
            .back-link:hover {
                color: #a7f3d0;
                text-decoration: underline;
            }
            .post-card:hover {
                transform: translateY(-5px);
            }
            .post-card h3 a:hover {
                color: #10b981;
            }
            .page-link:hover:not(.active) {
                background: #e2e8f0;
                transform: translateY(-1px);
            }
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
            color: #111827;
            line-height: 1.5;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        /* Header with gradient - no images */
        .sub-header {
            padding: 60px 0 48px;
            background: linear-gradient(135deg, #0b2b26 0%, #05100e 100%);
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
        }
        
        /* Animated gradient orbs */
        .sub-header::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.25), transparent);
            top: -80px;
            right: -80px;
            border-radius: 50%;
            animation: floatOrb 18s infinite alternate;
            pointer-events: none;
        }
        
        .sub-header::after {
            content: '';
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(110, 231, 183, 0.15), transparent);
            bottom: -60px;
            left: -60px;
            border-radius: 50%;
            animation: floatOrb2 20s infinite alternate;
            pointer-events: none;
        }
        
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(-40px, 40px) scale(1.2); opacity: 0.6; }
        }
        
        @keyframes floatOrb2 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
            100% { transform: translate(50px, -30px) scale(1.3); opacity: 0.5; }
        }
        
        .back-link {
            color: #6ee7b7;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 24px;
            display: inline-block;
            position: relative;
            z-index: 2;
        }
        
        .sub-header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
            letter-spacing: -0.02em;
            position: relative;
            z-index: 2;
        }
        
        .sub-header p {
            font-size: 1.2rem;
            color: #cbd5e1;
            max-width: 700px;
            line-height: 1.5;
            position: relative;
            z-index: 2;
        }
        
        /* Posts section */
        .posts-section {
            margin: 56px 0 64px;
        }
        
        .posts-section h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 32px;
            letter-spacing: -0.01em;
            border-left: 5px solid #10b981;
            padding-left: 18px;
        }
        
        .posts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 28px;
            margin: 32px 0 48px;
        }
        
        /* Mobile-first: single column, then tablet 2 columns, desktop 3 columns */
        @media (min-width: 640px) {
            .posts-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 28px;
            }
        }
        
        @media (min-width: 1024px) {
            .posts-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 36px;
            }
            .sub-header h1 {
                font-size: 2.8rem;
            }
        }
        
        .post-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 0 0 20px 0;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 4px 12px rgba(0,0,0,0.02);
            animation: fadeSlideUp 0.35s ease forwards;
        }
        
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(18px);}
            to { opacity: 1; transform: translateY(0);}
        }
        
        .post-category {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
            color: #0f766e;
            background: #ccfbf1;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            margin-bottom: 16px;
        }
        
        .post-card h3 {
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.35;
            margin-bottom: 12px;
        }
        
        @media (min-width: 640px) {
            .post-card h3 {
                font-size: 1.25rem;
            }
        }
        
        .post-card h3 a {
            color: #0f172a;
            text-decoration: none;
            transition: color 0.2s ease;
            display: inline-block;
        }
        
        .post-card p {
            font-size: 0.85rem;
            color: #475569;
            line-height: 1.5;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .post-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            font-size: 0.7rem;
            color: #6c757d;
            margin-top: 12px;
            border-top: 1px solid #eef2f6;
            padding-top: 14px;
        }
        
        .post-meta span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 48px 0 20px;
            flex-wrap: wrap;
        }
        
        .page-link {
            padding: 8px 16px;
            border-radius: 40px;
            background: #f1f5f9;
            text-decoration: none;
            color: #1e293b;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #e2e8f0;
            -webkit-tap-highlight-color: transparent;
        }
        
        .page-link.active {
            background: #0f766e;
            color: white;
            border-color: #0f766e;
        }
        
        .page-link:active {
            transform: scale(0.94);
        }
        
        .loading, .error {
            text-align: center;
            padding: 60px 20px;
            font-size: 1rem;
            color: #64748b;
            background: #f8fafc;
            border-radius: 32px;
            grid-column: 1 / -1;
        }
        
        .error {
            color: #b91c1c;
            background: #fef2f2;
        }
        
        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background: #0f0f13;
                color: #e4e4e7;
            }
            .post-card {
                background: #121720;
                box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            }
            .post-card h3 a {
                color: #e4e4e7;
            }
            .post-card p {
                color: #9ca3af;
            }
            .post-meta {
                border-top-color: #1f1f2a;
                color: #9ca3af;
            }
            .page-link {
                background: #1f1f2a;
                color: #9ca3af;
                border-color: #2a2a35;
            }
            .page-link.active {
                background: #10b981;
                color: white;
                border-color: #10b981;
            }
            .page-link:hover:not(.active) {
                background: #2a2a35;
                color: #e4e4e7;
            }
            .loading, .error {
                background: #1a1a1f;
                color: #9ca3af;
            }
            .error {
                background: #2a0a0a;
                color: #f87171;
            }
            .post-category {
                background: #134e4a;
                color: #6ee7b7;
            }
            .posts-section h2 {
                color: #e4e4e7;
            }
        }
        
        /* Touch device optimizations */
        @media (max-width: 640px) {
            .sub-header {
                padding: 40px 0 32px;
            }
            .sub-header h1 {
                font-size: 2rem;
            }
            .sub-header p {
                font-size: 1rem;
            }
            .posts-section {
                margin: 32px 0 48px;
            }
            .posts-section h2 {
                font-size: 1.4rem;
            }
            .page-link {
                padding: 6px 12px;
                font-size: 0.75rem;
            }
            .post-meta {
                gap: 12px;
            }
        }
        
        /* Skeleton loading animation */
        @keyframes skeletonPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .skeleton-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 0 0 20px 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .skeleton-category {
            width: 100px;
            height: 26px;
            background: #e2e8f0;
            border-radius: 40px;
            margin-bottom: 16px;
            animation: skeletonPulse 1.5s ease-in-out infinite;
        }
        .skeleton-title {
            width: 90%;
            height: 24px;
            background: #e2e8f0;
            border-radius: 8px;
            margin-bottom: 12px;
            animation: skeletonPulse 1.5s ease-in-out infinite;
        }
        .skeleton-excerpt {
            width: 100%;
            height: 60px;
            background: #e2e8f0;
            border-radius: 8px;
            margin-bottom: 16px;
            animation: skeletonPulse 1.5s ease-in-out infinite;
        }
        .skeleton-meta {
            width: 60%;
            height: 20px;
            background: #e2e8f0;
            border-radius: 8px;
            margin-top: 12px;
            animation: skeletonPulse 1.5s ease-in-out infinite;
        }
        
        @media (prefers-color-scheme: dark) {
            .skeleton-card {
                background: #1a1a1f;
            }
            .skeleton-category,
            .skeleton-title,
            .skeleton-excerpt,
            .skeleton-meta {
                background: #2a2a35;
            }
        }
    </style>
</head>
<body>
    <div class="sub-header">
        <div class="container">
            <a href="/categories/world/" class="back-link">← Back to World</a>
            <h1>🏥 Global Health</h1>
            <p>Pandemic preparedness, healthcare systems, disease eradication, and health equity worldwide.</p>
        </div>
    </div>
    <div class="container">
        <div class="posts-section">
            <h2>Latest in Global Health</h2>
            <div class="posts-grid" id="postsGrid">
                <!-- Skeleton loading state -->
                <div class="skeleton-card">
                    <div class="skeleton-category"></div>
                    <div class="skeleton-title"></div>
                    <div class="skeleton-excerpt"></div>
                    <div class="skeleton-meta"></div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton-category"></div>
                    <div class="skeleton-title"></div>
                    <div class="skeleton-excerpt"></div>
                    <div class="skeleton-meta"></div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton-category"></div>
                    <div class="skeleton-title"></div>
                    <div class="skeleton-excerpt"></div>
                    <div class="skeleton-meta"></div>
                </div>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        const CATEGORY = 'world';
        // Match multiple possible subcategory name variations
        const SUBCATEGORY_VARIANTS = [
            'health', 
            'global-health',
            'global health', 
            'Health', 
            'HEALTH',
            'public-health',
            'pandemic'
        ];
        let currentPage = 1;
        const POSTS_PER_PAGE = 9;
        let allPosts = [];

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPostDate(dateStr) {
            if (!dateStr) return 'Recent';
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr;
                return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            } catch (e) {
                return dateStr;
            }
        }

        async function loadContent() {
            const postsGrid = document.getElementById('postsGrid');
            const paginationDiv = document.getElementById('pagination');
            
            try {
                console.log('Loading global health content...');
                const response = await fetch('/data/posts.json?t=' + Date.now());
                if (!response.ok) throw new Error(`HTTP ${response.status} - Unable to load posts`);
                const data = await response.json();
                let postsArray = Array.isArray(data) ? data : (data.posts || []);
                console.log('Total posts found:', postsArray.length);
                
                // Log available subcategories for debugging
                const uniqueSubcategories = [...new Set(postsArray.map(p => p.subcategory))];
                console.log('Available subcategories in your data:', uniqueSubcategories);
                
                // Filter by category AND subcategory (case-insensitive, multiple variants)
                allPosts = postsArray.filter(post => {
                    const matchesCategory = (post.category || '').toLowerCase() === CATEGORY.toLowerCase();
                    const matchesSubcategory = SUBCATEGORY_VARIANTS.some(variant => 
                        post.subcategory === variant || 
                        post.subcategory?.toLowerCase() === variant.toLowerCase()
                    );
                    return matchesCategory && matchesSubcategory;
                });
                
                // Sort by date descending (newest first) if date field exists
                allPosts.sort((a, b) => {
                    const dateA = a.date ? new Date(a.date) : new Date(0);
                    const dateB = b.date ? new Date(b.date) : new Date(0);
                    return dateB - dateA;
                });
                
                console.log('Filtered global health posts:', allPosts.length);
                
                if (allPosts.length === 0) {
                    const debugInfo = uniqueSubcategories.length ? 
                        `<br><br><span style="font-size:0.8rem; opacity:0.7;">Available world subcategories: ${uniqueSubcategories.join(', ')}</span>` : '';
                    postsGrid.innerHTML = `<div class="loading">🏥 No global health articles found yet. Check back for updates on pandemic preparedness and healthcare innovations.${debugInfo}</div>`;
                    paginationDiv.innerHTML = '';
                    return;
                }
                
                renderPosts();
            } catch (error) {
                console.error('Fetch error:', error);
                postsGrid.innerHTML = `<div class="error">⚠️ Error: ${escapeHtml(error.message)}. Please verify that /data/posts.json exists and contains valid JSON. Refresh to try again.</div>`;
                paginationDiv.innerHTML = '';
            }
        }

        function renderPosts() {
            const postsGrid = document.getElementById('postsGrid');
            const start = (currentPage - 1) * POSTS_PER_PAGE;
            const pagePosts = allPosts.slice(start, start + POSTS_PER_PAGE);
            
            if (pagePosts.length === 0 && allPosts.length > 0) {
                currentPage = Math.ceil(allPosts.length / POSTS_PER_PAGE);
                return renderPosts();
            }
            
            postsGrid.innerHTML = pagePosts.map(post => {
                const displayCategory = post.subcategory ? post.subcategory.toUpperCase() : 'GLOBAL HEALTH';
                const postTitle = post.title || 'Untitled Insight';
                const excerpt = post.excerpt || post.content?.replace(/<[^>]*>/g, '').substring(0, 140) || 'Exploring critical developments in global health systems and international cooperation.';
                const shortExcerpt = excerpt.length > 130 ? excerpt.substring(0, 127) + '...' : excerpt;
                const postDate = formatPostDate(post.date);
                const readTime = post.readTime || (post.content ? Math.max(3, Math.ceil(post.content.length / 900)) : 5);
                const views = post.views || Math.floor(Math.random() * 800) + 200;
                const articleLink = post.url ? post.url : `/posts/index.html?id=${post.id}`;
                
                return `
                    <div class="post-card" onclick="location.href='${escapeHtml(articleLink)}'">
                        <div class="post-category">${escapeHtml(displayCategory)}</div>
                        <h3><a href="${escapeHtml(articleLink)}">${escapeHtml(postTitle)}</a></h3>
                        <p>${escapeHtml(shortExcerpt)}</p>
                        <div class="post-meta">
                            <span>📅 ${escapeHtml(postDate)}</span>
                            <span>⏱️ ${readTime} min read</span>
                            <span>👁️ ${Number(views).toLocaleString()} views</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            renderPagination();
        }
        
        function renderPagination() {
            const paginationDiv = document.getElementById('pagination');
            const totalPages = Math.ceil(allPosts.length / POSTS_PER_PAGE);
            if (totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }
            
            let html = '';
            if (currentPage > 1) {
                html += `<a href="#" class="page-link" data-page="${currentPage - 1}">← Prev</a>`;
            }
            
            const maxVisible = 5;
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, currentPage + 2);
            
            if (endPage - startPage < maxVisible - 1) {
                if (startPage === 1) endPage = Math.min(totalPages, startPage + maxVisible - 1);
                else if (endPage === totalPages) startPage = Math.max(1, endPage - maxVisible + 1);
            }
            
            if (startPage > 1) {
                html += `<a href="#" class="page-link" data-page="1">1</a>`;
                if (startPage > 2) html += `<span class="page-link" style="background:transparent; border:none; cursor:default;">...</span>`;
            }
            
            for (let i = startPage; i <= endPage; i++) {
                const activeClass = i === currentPage ? 'active' : '';
                html += `<a href="#" class="page-link ${activeClass}" data-page="${i}">${i}</a>`;
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<span class="page-link" style="background:transparent; border:none; cursor:default;">...</span>`;
                html += `<a href="#" class="page-link" data-page="${totalPages}">${totalPages}</a>`;
            }
            
            if (currentPage < totalPages) {
                html += `<a href="#" class="page-link" data-page="${currentPage + 1}">Next →</a>`;
            }
            
            paginationDiv.innerHTML = html;
            
            document.querySelectorAll('.page-link[data-page]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const newPage = parseInt(link.getAttribute('data-page'), 10);
                    if (!isNaN(newPage) && newPage !== currentPage) {
                        currentPage = newPage;
                        renderPosts();
                        const postsSection = document.querySelector('.posts-section');
                        if (postsSection) {
                            postsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        } else {
                            window.scrollTo({ top: 280, behavior: 'smooth' });
                        }
                    }
                });
            });
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadContent();
        });
        
        window.retryLoad = function() {
            currentPage = 1;
            loadContent();
        };
    </script>
    <noscript>
        <div style="text-align:center; padding:40px;">JavaScript required to load dynamic articles.</div>
    </noscript>
</body>
</html>
