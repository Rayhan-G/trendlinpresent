<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>World | Trendlin — Intelligence for the Modern World</title>
    <meta name="description" content="What's shaping our world. Live insights on geopolitics, global economy, climate, and international affairs — only the freshest posts.">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary-500: #0F6EFF;
            --gray-900: #1E1E2F;
            --gray-700: #4A4A5A;
            --gray-600: #6E6E80;
            --gray-200: #EDEDF2;
            --gray-100: #F5F5F8;
            --white: #FFFFFF;
            --bg-app: var(--gray-100);
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-600);
            --space-6: 24px;
            --space-12: 48px;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-app);
            color: var(--text-primary);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 var(--space-6);
        }

        #header-placeholder, #footer-placeholder {
            width: 100%;
        }

        /* World Hero */
        .hero {
            padding: 60px 0 50px;
            background: linear-gradient(135deg, #0a1620 0%, #050a10 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.3), transparent);
            top: -100px;
            right: -100px;
            border-radius: 50%;
            animation: floatOrb 15s infinite alternate;
        }

        .hero::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.2), transparent);
            bottom: -150px;
            left: -150px;
            border-radius: 50%;
            animation: floatOrb2 18s infinite alternate;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(-50px, 50px) scale(1.3); opacity: 0.6; }
        }

        @keyframes floatOrb2 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
            100% { transform: translate(60px, -40px) scale(1.4); opacity: 0.5; }
        }

        .hero-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(139, 92, 246, 0.08) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(139, 92, 246, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(139, 92, 246, 0.2);
            backdrop-filter: blur(10px);
            color: #a78bfa;
            padding: 6px 20px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 24px;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .hero h1 {
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            color: white;
            letter-spacing: -0.03em;
        }

        .hero h1 span {
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero p {
            font-size: 1rem;
            color: #9ca3af;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .feed-section {
            padding: var(--space-12) 0;
            background: var(--bg-app);
        }

        /* ========== IMPROVED SUBCATEGORY CARD DESIGN ========== */
        .subcategory-showcase {
            padding: 80px 0;
            background: linear-gradient(135deg, #f9fafb 0%, #ffffff 100%);
        }
        .subcategory-showcase .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .showcase-header {
            text-align: center;
            margin-bottom: 56px;
        }
        .showcase-header .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #8b5cf6;
            margin-bottom: 16px;
            font-weight: 600;
        }
        .showcase-header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 16px;
        }
        .showcase-header p {
            color: #6b7280;
            font-size: 0.95rem;
        }
        .subcategory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 32px;
        }
        
        /* IMPROVED CARD STYLES - Premium Modern World Design */
        .subcategory-card {
            position: relative;
            min-height: 380px;
            border-radius: 28px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(139, 92, 246, 0.15);
        }
        
        /* Animated gradient border on hover */
        .subcategory-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            padding: 2px;
            background: linear-gradient(135deg, #8b5cf6, #60a5fa, #8b5cf6, #a78bfa);
            background-size: 300% 300%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        
        .subcategory-card:hover::before {
            opacity: 1;
            animation: borderFlow 3s ease infinite;
        }
        
        @keyframes borderFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Soft glow effect on hover */
        .subcategory-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: radial-gradient(ellipse at 30% 0%, rgba(139, 92, 246, 0.06), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        
        .subcategory-card:hover::after {
            opacity: 1;
        }
        
        .subcategory-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.2);
            border-color: rgba(139, 92, 246, 0.3);
        }
        
        /* Card Inner Content */
        .card-inner {
            padding: 32px 28px;
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
            background: white;
            border-radius: 28px;
            transition: background 0.3s ease;
        }
        
        .subcategory-card:hover .card-inner {
            background: linear-gradient(135deg, #ffffff, #f5f3ff);
        }
        
        /* Dark mode inner background */
        @media (prefers-color-scheme: dark) {
            .card-inner {
                background: #1e1e2a;
            }
            .subcategory-card:hover .card-inner {
                background: linear-gradient(135deg, #252530, #1a1a2e);
            }
        }
        
        /* Icon styling with gradient background */
        .card-icon-wrapper {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.12), rgba(96, 165, 250, 0.08));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        .subcategory-card:hover .card-icon-wrapper {
            transform: scale(1.02) translateY(-2px);
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(96, 165, 250, 0.15));
            border-color: rgba(139, 92, 246, 0.4);
        }
        
        .card-icon {
            font-size: 2.4rem;
            transition: transform 0.3s ease;
        }
        
        .subcategory-card:hover .card-icon {
            transform: scale(1.05);
        }
        
        /* Title with gradient text */
        .card-title {
            font-size: 1.65rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1f2937, #374151);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        @media (prefers-color-scheme: dark) {
            .card-title {
                background: linear-gradient(135deg, #f0f0ff, #c7c7e0);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
            }
        }
        
        /* Tagline with brand color */
        .card-tagline {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8b5cf6;
            margin-bottom: 12px;
        }
        
        /* Description */
        .card-description {
            font-size: 0.9rem;
            color: #6b7280;
            line-height: 1.55;
            margin-bottom: 28px;
            flex: 1;
        }
        
        @media (prefers-color-scheme: dark) {
            .card-description {
                color: #9ca3af;
            }
        }
        
        /* Explore button modern */
        .explore-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #8b5cf6;
            transition: all 0.3s ease;
            padding: 8px 0;
            border-bottom: 2px solid rgba(139, 92, 246, 0.2);
            width: fit-content;
        }
        
        .subcategory-card:hover .explore-link {
            gap: 12px;
            color: #7c3aed;
            border-bottom-color: #8b5cf6;
        }
        
        .explore-link span {
            transition: transform 0.25s ease;
            font-size: 1rem;
        }
        
        .subcategory-card:hover .explore-link span {
            transform: translateX(5px);
        }
        
        /* Subtle decorative line at bottom */
        .card-decoration {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #8b5cf6, #60a5fa, #8b5cf6);
            transform: scaleX(0);
            transition: transform 0.4s ease;
            transform-origin: left;
            border-radius: 0 0 28px 28px;
        }
        
        .subcategory-card:hover .card-decoration {
            transform: scaleX(1);
        }
        
        /* Loading state */
        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
            font-size: 0.95rem;
        }
        
        /* Dark Mode support */
        @media (prefers-color-scheme: dark) {
            .subcategory-showcase {
                background: #0f0f16;
            }
            .showcase-header h2 {
                color: #f0f0ff;
            }
            .showcase-header p {
                color: #a1a1aa;
            }
            .subcategory-card {
                background: transparent;
                border-color: rgba(139, 92, 246, 0.2);
            }
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .hero h1 { font-size: 1.8rem; }
            .subcategory-grid { 
                grid-template-columns: 1fr;
                gap: 24px;
            }
            .card-inner {
                padding: 24px 20px;
            }
            .card-title {
                font-size: 1.4rem;
            }
            .card-icon-wrapper {
                width: 52px;
                height: 52px;
            }
            .card-icon {
                font-size: 2rem;
            }
        }
        
        /* Tablet adjustments */
        @media (min-width: 769px) and (max-width: 1024px) {
            .subcategory-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

<div id="header-placeholder"></div>

<!-- World Hero -->
<section class="hero">
    <div class="hero-grid"></div>
    <div class="container">
        <div class="hero-content">
            <div class="hero-badge">TRENDLIN WORLD</div>
            <h1>What's <span>shaping our world</span></h1>
            <p>We research global trends — geopolitics, economy, climate, and international affairs — so you understand what actually matters.</p>
        </div>
    </div>
</section>

<!-- Live Feed -->
<section class="feed-section">
    <div class="container">
        <div id="live-feed-root"></div>
    </div>
</section>

<!-- Subcategory Section - IMPROVED CARD DESIGN (Article Count Removed) -->
<div class="subcategory-showcase">
    <div class="container">
        <div class="showcase-header">
            <div class="section-label">Explore Topics</div>
            <h2>Navigate a complex world</h2>
            <p>Dive into your favorite global topics</p>
        </div>
        <div class="subcategory-grid" id="subcategory-grid">
            <div class="loading">Loading categories...</div>
        </div>
    </div>
</div>

<div id="footer-placeholder"></div>

<script>
    // Load header and footer
    function loadComponent(elementId, filePath) {
        fetch(filePath)
            .then(response => response.ok ? response.text() : Promise.reject())
            .then(html => {
                document.getElementById(elementId).innerHTML = html;
            })
            .catch(() => {
                document.getElementById(elementId).innerHTML = `<div style="text-align:center;padding:20px;">Failed to load</div>`;
            });
    }

    loadComponent('header-placeholder', '/components/header.html');
    loadComponent('footer-placeholder', '/components/footer.html');

    // Load and modify the live feed component - FORCE WORLD ONLY
    const liveFeedContainer = document.getElementById('live-feed-root');
    if (liveFeedContainer) {
        fetch('/components/live-feed-component.html')
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.text();
            })
            .then(html => {
                let modifiedHtml = html.replace(
                    "const JSON_PATH = 'live-feed/data/posts.json';",
                    "const JSON_PATH = '/live-feed/data/posts.json';"
                );
                
                modifiedHtml = modifiedHtml.replace(
                    "'use strict';",
                    `'use strict';\n        const FORCED_CATEGORY = 'world';\n        const originalFilterByCategory = filterByCategory;\n        window.filterByCategory = function(category) {\n            if (category !== FORCED_CATEGORY) return;\n            originalFilterByCategory(FORCED_CATEGORY);\n        };\n        document.addEventListener('DOMContentLoaded', function() {\n            const filterBar = document.querySelector('.category-filter');\n            if (filterBar) filterBar.style.display = 'none';\n        });`
                );
                
                modifiedHtml = modifiedHtml.replace(
                    "allPosts = data.posts;",
                    `allPosts = data.posts;\n                allPosts = allPosts.filter(p => p.category?.toLowerCase() === FORCED_CATEGORY);\n                console.log(\`🌍 World only: \${allPosts.length} posts\`);`
                );
                
                modifiedHtml = modifiedHtml.replace(
                    "filterByCategory('all');",
                    "filterByCategory(FORCED_CATEGORY);"
                );
                
                liveFeedContainer.innerHTML = modifiedHtml;
                
                const scripts = liveFeedContainer.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }
                    document.body.appendChild(newScript);
                });
                
                setTimeout(() => {
                    const observer = new MutationObserver(function() {
                        const countSpan = document.getElementById('livePostCount');
                        if (countSpan && countSpan.textContent !== '0') {
                            const postCountEl = document.getElementById('postCount');
                            if (postCountEl) postCountEl.textContent = countSpan.textContent;
                        }
                    });
                    observer.observe(document.body, { childList: true, subtree: true });
                }, 500);
            })
            .catch(error => {
                console.error('Failed to load component:', error);
                liveFeedContainer.innerHTML = `<div style="text-align:center; padding:60px;">Failed to load feed</div>`;
            });
    }

    // Subcategories data for World (Article count badge removed as requested)
    const WORLD_SUBCATEGORIES = [
        { name: 'Geopolitics', icon: '🌍', tagline: 'Global power shifts', description: 'International relations, diplomacy & strategic analysis of world affairs.', slug: 'geopolitics' },
        { name: 'Global Economy', icon: '📊', tagline: 'Markets & trade', description: 'Economic trends, trade dynamics & financial systems shaping prosperity.', slug: 'economy' },
        { name: 'Climate', icon: '🌡️', tagline: 'Planet in focus', description: 'Climate change, energy transition & environmental policy for sustainability.', slug: 'climate' },
        { name: 'Global Tech', icon: '🖥️', tagline: 'Digital transformation', description: 'Tech regulation, innovation & digital divide across borders.', slug: 'technology' },
        { name: 'Global Health', icon: '🏥', tagline: 'Wellness worldwide', description: 'Pandemics, healthcare systems & medical advances for all.', slug: 'health' },
        { name: 'Human Rights', icon: '✊', tagline: 'Dignity for all', description: 'Equality, justice & humanitarian issues demanding attention.', slug: 'human-rights' }
    ];

    // Simplified render function — NO ARTICLE BADGE, NO ARTICLE COUNT ANYWHERE
    async function renderSubcategoryGrid() {
        const grid = document.getElementById('subcategory-grid');
        if (!grid) return;
        
        // Build cards without any article count badge or count logic
        const cards = [];
        for (const cat of WORLD_SUBCATEGORIES) {
            cards.push(`
                <a href="/categories/world/${cat.slug}/" class="subcategory-card">
                    <div class="card-inner">
                        <div class="card-icon-wrapper">
                            <div class="card-icon">${cat.icon}</div>
                        </div>
                        <h3 class="card-title">${cat.name}</h3>
                        <div class="card-tagline">${cat.tagline}</div>
                        <p class="card-description">${cat.description}</p>
                        <div class="explore-link">Explore <span>→</span></div>
                    </div>
                    <div class="card-decoration"></div>
                </a>
            `);
        }
        grid.innerHTML = cards.join('');
    }

    // Execute after DOM is fully loaded
    document.addEventListener('DOMContentLoaded', () => {
        renderSubcategoryGrid();
    });
</script>

</body>
</html>
